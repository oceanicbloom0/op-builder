name: Win Packing

on:
  pull_request:
    paths:
      - ".github/workflows/win-pack.yml"
  workflow_dispatch:
    inputs:

      checker:
        description: "checker"
        required: true
        default: false
        type: boolean
      inject_files:
        description: "Inject files from InjectFiles directory"
        required: true
        default: true
        type: boolean
      preplace_common_apps:
        description: "Preplace common app installers on the desktop"
        required: true
        default: true
        type: boolean
      preplace_tubatools:
        description: "Preplace tubatools on the desktop"
        required: true
        default: true
        type: boolean
      include_office_payload:
        description: "Download Office offline files, pack them into the image, and install on first logon"
        required: true
        default: true
        type: boolean
      script_pack_only:
        description: "Only build Windows script pack and payloads"
        required: true
        default: false
        type: boolean
      #output_pack_name:
      #  description: "Output script pack ISO filename"
      #  required: true
      #  default: "windows-script-pack.iso"
      #  type: string
      add_oem_information:
        description: "Add custom OEM information to system properties"
        required: true
        default: false
        type: boolean
      auto_partition_install:
        description: "Wipe disk 0 and install automatically using UEFI/GPT"
        required: true
        default: false
        type: boolean
      inject_vioscsi_driver:
        description: "Inject VirtIO SCSI driver into Windows Setup and the installed system"
        required: true
        default: false
        type: boolean
      test_mode:
        description: "Test mode (only build, skip deploy)"
        required: true
        default: false
        type: boolean
      runner:
        description: "Runner type"
        required: true
        default: "windows-latest"
        type: choice
        options:
          - windows-latest
          - windows-2022
          - windows-2025
          - windows-2025-vs2026
      windows_version:
        description: "Windows version"
        required: true
        default: "11"
        type: choice
        options:
          - "10"
          - "11"
      windows_language:
        description: "Windows language code"
        required: true
        default: "zh-cn"
        type: choice
        options:
          - "zh-cn"
          - "en-us"
      source_iso_path:
        description: "Custom source ISO path or URL (leave empty to use Fido to download official ISO)"
        required: false
        default: ""
      # output_iso_name:
      #   description: "Output ISO filename"
      #   required: true
      #   default: "custom-install.iso"

jobs:
  pack:
    runs-on: ${{ github.event.inputs.runner || 'windows-latest' }}

    steps:
      - name: Prepare directories
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = if (Test-Path "D:\") { "D:" } else { "C:" }
          Write-Host "Using work root: $root"
          "WORK_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          New-Item -ItemType Directory -Path "$root\input" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\wim" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\iso-src" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\mount" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\software" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\office-tool" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\office-offline" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\output" -Force | Out-Null

      - name: Clone ext-repo
        shell: pwsh
        env:
          ACTION_RSA: ${{ secrets.ACTION_RSA }}
          EXT_REPO: ${{ secrets.EXT_REPO }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT

          $sshDir = Join-Path $env:USERPROFILE ".ssh"
          New-Item -ItemType Directory -Path $sshDir -Force | Out-Null
          $sshPath = Join-Path $sshDir "id_rsa"
          [System.IO.File]::WriteAllText($sshPath, "$env:ACTION_RSA`n")
          icacls $sshPath /c /t /inheritance:d | Out-Null
          icacls $sshPath /c /t /grant:r "$($env:USERNAME):F" | Out-Null
          icacls $sshPath /c /t /remove:g "Administrator" "Authenticated Users" "Users" "Everyone" | Out-Null
          git config --global core.sshCommand "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          $extDir = "$root\ext-repo"
          New-Item -ItemType Directory -Path $extDir -Force | Out-Null
          Set-Location $extDir
          git init
          git remote add origin "git@github.com:$($env:EXT_REPO).git"
          git fetch origin
          git checkout -t origin/main

      - name: Build Windows image
        if: ${{ !inputs.script_pack_only }}
        shell: pwsh
        env:
          WINDOWS_VERSION: ${{ github.event.inputs.windows_version || '11' }}
          WINDOWS_LANGUAGE: ${{ github.event.inputs.windows_language || 'zh-cn' }}
          INJECT_FILES: ${{ github.event.inputs.inject_files || 'true' }}
          PREPLACE_COMMON_APPS: ${{ github.event.inputs.preplace_common_apps || 'true' }}
          PREPLACE_TUBATOOLS: ${{ github.event.inputs.preplace_tubatools || 'true' }}
          ADD_OEM_INFORMATION: ${{ github.event.inputs.add_oem_information || 'false' }}
          AUTO_PARTITION_INSTALL: ${{ github.event.inputs.auto_partition_install || 'false' }}
          INJECT_VIOSCSI_DRIVER: ${{ github.event.inputs.inject_vioscsi_driver || 'false' }}
          INCLUDE_OFFICE_PAYLOAD: ${{ github.event.inputs.include_office_payload || 'true' }}
          SOURCE_ISO_PATH: ${{ github.event.inputs.source_iso_path || '' }}
          OUTPUT_ISO_NAME: ${{ github.event.inputs.output_iso_name || 'custom-install.iso' }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $buildScript = "$root\ext-repo\win\Build-Windows.ps1"

          & $buildScript `
            -WorkRoot $root `
            -WindowsVersion $env:WINDOWS_VERSION `
            -WindowsLanguage $env:WINDOWS_LANGUAGE `
            -OutputIsoName $env:OUTPUT_ISO_NAME `
            -IncludeOfficePayload ([System.Convert]::ToBoolean($env:INCLUDE_OFFICE_PAYLOAD)) `
            -PackageIso $true `
            -PreplaceCommonApps ([System.Convert]::ToBoolean($env:PREPLACE_COMMON_APPS)) `
            -PreplaceTubaTools ([System.Convert]::ToBoolean($env:PREPLACE_TUBATOOLS)) `
            -AddOemInformation ([System.Convert]::ToBoolean($env:ADD_OEM_INFORMATION)) `
            -AutoPartitionInstall ([System.Convert]::ToBoolean($env:AUTO_PARTITION_INSTALL)) `
            -InjectVirtioScsiDriver ([System.Convert]::ToBoolean($env:INJECT_VIOSCSI_DRIVER)) `
            -InjectFiles ([System.Convert]::ToBoolean($env:INJECT_FILES)) `
            -SourceIsoPath $env:SOURCE_ISO_PATH

      - name: Build Windows script pack
        if: ${{ inputs.script_pack_only }}
        shell: pwsh
        env:
          INJECT_FILES: ${{ github.event.inputs.inject_files || 'true' }}
          PREPLACE_COMMON_APPS: ${{ github.event.inputs.preplace_common_apps || 'true' }}
          PREPLACE_TUBATOOLS: ${{ github.event.inputs.preplace_tubatools || 'true' }}
          INCLUDE_OFFICE_PAYLOAD: ${{ github.event.inputs.include_office_payload || 'true' }}
          OUTPUT_PACK_NAME: ${{ github.event.inputs.output_pack_name || 'windows-script-pack.iso' }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $buildScript = "$root\ext-repo\win\Build-ScriptPack.ps1"

          & $buildScript `
            -WorkRoot $root `
            -OutputPackName $env:OUTPUT_PACK_NAME `
            -IncludeOfficePayload ([System.Convert]::ToBoolean($env:INCLUDE_OFFICE_PAYLOAD)) `
            -PreplaceCommonApps ([System.Convert]::ToBoolean($env:PREPLACE_COMMON_APPS)) `
            -PreplaceTubaTools ([System.Convert]::ToBoolean($env:PREPLACE_TUBATOOLS)) `
            -InjectFiles ([System.Convert]::ToBoolean($env:INJECT_FILES))

      - name: Run deploy script
        if: ${{ !fromJSON(github.event.inputs.test_mode || 'false') }}
        shell: pwsh
        env:
          CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $deployScript = "$root\ext-repo\deploy-win-pack.ps1"

          & $deployScript

      - name: Checker
        if: ${{ !fromJSON(github.event.inputs.test_mode || 'false') && fromJSON(github.event.inputs.checker || 'false') }}
        shell: pwsh
        run: |
          while ($true) {
            Start-Sleep -Seconds 300
          }

      - name: Webhook callback
        if: ${{ !fromJSON(github.event.inputs.test_mode || 'false') && success() }}
        shell: pwsh
        env:
          DOWNLOAD_WEBHOOK_URL: ${{ secrets.DOWNLOAD_WEBHOOK_URL }}
          DOWNLOAD_WEBHOOK_TOKEN: ${{ secrets.DOWNLOAD_WEBHOOK_TOKEN }}
          SCRIPT_PACK_ONLY: ${{ github.event.inputs.script_pack_only || 'false' }}
          OUTPUT_ISO_NAME: ${{ github.event.inputs.output_iso_name || 'custom-install.iso' }}
          OUTPUT_PACK_NAME: ${{ github.event.inputs.output_pack_name || 'windows-script-pack.iso' }}
          WINDOWS_VERSION: ${{ github.event.inputs.windows_version || '11' }}
          WINDOWS_LANGUAGE: ${{ github.event.inputs.windows_language || 'zh-cn' }}
          INJECT_FILES: ${{ github.event.inputs.inject_files || 'true' }}
          PREPLACE_COMMON_APPS: ${{ github.event.inputs.preplace_common_apps || 'true' }}
          PREPLACE_TUBATOOLS: ${{ github.event.inputs.preplace_tubatools || 'true' }}
          ADD_OEM_INFORMATION: ${{ github.event.inputs.add_oem_information || 'false' }}
          AUTO_PARTITION_INSTALL: ${{ github.event.inputs.auto_partition_install || 'false' }}
          INJECT_VIOSCSI_DRIVER: ${{ github.event.inputs.inject_vioscsi_driver || 'false' }}
          INCLUDE_OFFICE_PAYLOAD: ${{ github.event.inputs.include_office_payload || 'true' }}
        run: |
          $ErrorActionPreference = "Stop"

          $triggerUrl = $env:DOWNLOAD_WEBHOOK_URL.Trim()
          $baseUrl = $triggerUrl -replace '\?.*$', ''
          $baseUrl = $baseUrl -replace '/trigger/?$', ''

          $scriptPackOnly = [System.Convert]::ToBoolean($env:SCRIPT_PACK_ONLY)
          $suffixParts = @()
          if ($scriptPackOnly) {
            $suffixParts += "script_pack"
          } else {
            foreach ($value in @($env:WINDOWS_VERSION, $env:WINDOWS_LANGUAGE)) {
              if (-not [string]::IsNullOrWhiteSpace($value) -and $value -ne "false") {
                $suffixParts += $value.Trim()
              }
            }
          }

          $flagParts = [ordered]@{
            INJECT_FILES = "inject_files"
            PREPLACE_COMMON_APPS = "preplace_common"
            PREPLACE_TUBATOOLS = "preplace_tubatools"
            INCLUDE_OFFICE_PAYLOAD = "include_office_payload"
          }
          if (-not $scriptPackOnly) {
            $flagParts["ADD_OEM_INFORMATION"] = "add_oem_information"
            $flagParts["AUTO_PARTITION_INSTALL"] = "auto_partition_install"
            $flagParts["INJECT_VIOSCSI_DRIVER"] = "inject_vioscsi_driver"
          }
          foreach ($flag in $flagParts.GetEnumerator()) {
            $value = [string](Get-Item -Path "Env:$($flag.Key)").Value
            if (-not [string]::IsNullOrWhiteSpace($value) -and [System.Convert]::ToBoolean($value)) {
              $suffixParts += $flag.Value
            }
          }
          $suffixParts += $env:GITHUB_RUN_ID
          if ($scriptPackOnly) {
            $outputPackName = $env:OUTPUT_PACK_NAME
            if ($outputPackName.EndsWith(".zip", [System.StringComparison]::OrdinalIgnoreCase)) {
              $outputPackName = [System.IO.Path]::ChangeExtension($outputPackName, ".iso")
            } elseif (-not $outputPackName.EndsWith(".iso", [System.StringComparison]::OrdinalIgnoreCase)) {
              $outputPackName = "$outputPackName.iso"
            }
            $packBaseName = [System.IO.Path]::GetFileNameWithoutExtension($outputPackName)
            $downloadName = "$packBaseName`_$($suffixParts -join '-').iso"
            $sourcePath = Join-Path $env:WORK_ROOT "output\$outputPackName"
            $downloadPath = Join-Path $env:WORK_ROOT "output\$downloadName"
            $missingMessage = "callback: output script pack ISO not found: $sourcePath"
          } else {
            $downloadName = "$($env:OUTPUT_ISO_NAME)_$($suffixParts -join '-').iso"
            $sourcePath = Join-Path $env:WORK_ROOT "output\$($env:OUTPUT_ISO_NAME)"
            $downloadPath = Join-Path $env:WORK_ROOT "output\$downloadName"
            $missingMessage = "callback: output ISO not found: $sourcePath"
          }
          if (-not (Test-Path -LiteralPath $sourcePath)) {
            throw $missingMessage
          }
          if ($sourcePath -ne $downloadPath) {
            Copy-Item -LiteralPath $sourcePath -Destination $downloadPath -Force
          }

          $webPath = "/output/$([System.Uri]::EscapeDataString($downloadName))"

          $body = @{
            web_path = $webPath
            context = @{
              run_id = $env:GITHUB_RUN_ID
              run_number = $env:GITHUB_RUN_NUMBER
              sha = $env:GITHUB_SHA
            }
          } | ConvertTo-Json -Depth 5

          $responseJson = & curl.exe -fsS `
            -X POST $triggerUrl `
            -H "Authorization: Bearer $env:DOWNLOAD_WEBHOOK_TOKEN" `
            -H "Content-Type: application/json" `
            --data $body
          $response = $responseJson | ConvertFrom-Json

          $jobId = $response.job_id
          if (-not $jobId) {
            throw "callback: webhook did not return a job id. response=$responseJson"
          }

          Write-Host "callback: download job queued."
          $deadline = (Get-Date).AddHours(2)

          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Seconds 15
            $jobJson = & curl.exe -fsS "$baseUrl/jobs/$jobId"
            $job = $jobJson | ConvertFrom-Json
            $status = [string]$job.status
            Write-Host "callback: download status: $status"

            if ($status -eq "completed") {
              Write-Host "callback: download completed."
              exit 0
            }

            if ($status -eq "failed") {
              throw "callback: download failed."
            }
          }

          throw "Timed out waiting for callback: download job."
