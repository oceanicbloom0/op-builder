name: Generate Matrix

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式：single = 使用单个源码地址；config = 从配置文件里选择一个；all = 编译配置文件中所有源码"
        required: true
        default: "single"
        type: choice
        options:
          - single
          - config
          - all
      source_url:
        description: "单个源码地址（仅在 mode=single 时使用）"
        required: false
        default: "https://github.com/coolsnowwolf/lede.git"
        type: string
      source_branch:
        description: "源码分支（仅在 mode=single 时使用）"
        required: false
        default: "master"
        type: string
      config_name:
        description: "配置文件中的配置名（仅在 mode=config 时使用）。可为 'all' 表示全部。"
        required: false
        type: string
      app_config_path:
        description: "Path to the application configuration file"
        required: true
        default: "configs/app.config"
      devices:
        description: "Specific devices to build (comma-separated, empty for all)"
        required: false
        default: ""
      trigger-build-event-type:
        description: "Trigger build event type name"
        required: true
        default: "trigger-build-openwrt"
      ssh:
        description: "Enable SSH"
        required: true
        type: boolean
      only_ssh:
        description: "Use SSH only"
        required: true
        type: boolean
      running_ssh_device:
        description: "Name of the device where SSH is running"
        required: true
        default: "x86-64"
  repository_dispatch:
    types: [trigger-build-openwrt_main]

env:
  APP_CONFIG_PATH: ${{ inputs.app_config_path }}

jobs:
  resolve-sources:
    runs-on: ubuntu-22.04
    outputs:
      sources_json: ${{ steps.resolve-sources.outputs.sources_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set script permissions
        run: chmod +x scripts/*.sh

      - name: Resolve sources
        id: resolve-sources
        run: |
          # 解析源码配置
          sources_json=$(./scripts/resolve-sources.sh \
            "${{ github.event.inputs.mode }}" \
            "${{ github.event.inputs.source_url }}" \
            "${{ github.event.inputs.source_branch }}" \
            "${{ github.event.inputs.config_name }}")

          # 检查是否有错误
          if [ $? -ne 0 ]; then
            echo "Error: Failed to resolve sources"
            exit 1
          fi

          echo "sources_json=$sources_json" >> $GITHUB_OUTPUT
          echo "Resolved sources:"
          echo "$sources_json"

  generate-matrix:
    needs: resolve-sources
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load environment config
        id: load-env
        run: |
          if [ ! -f "env.config" ]; then
            echo "Error: env.config file not found - this file is required"
            exit 1
          fi
          while IFS='=' read -r key value; do
            if [[ ! "$key" =~ ^# && -n "$key" ]]; then
              echo "$key=$value" >> $GITHUB_ENV
              echo "Loaded $key=$value"
            fi
          done < "env.config"

      - id: set-matrix
        run: |
          cd configs

          # Validate if device exists (run in configs directory)
          validate_device() {
            local device=$1
            if [ -d "$device" ] || [ -d "STANDALONE_CONF/$device" ]; then
              return 0
            else
              return 1
            fi
          }

          # Generate JSON matrix
          generate_matrix() {
            local devices=$1
            local sources_json='${{ needs.resolve-sources.outputs.sources_json }}'
            local matrix="{\"include\":["

            # 解析源码配置
            sources_count=$(echo "$sources_json" | jq length)
            if [ "$sources_count" -eq 0 ]; then
              echo "Error: No sources found"
              exit 1
            fi

            for device in $devices; do
              if validate_device "$device"; then
                # 为每个源码配置生成设备矩阵
                for i in $(seq 0 $((sources_count - 1))); do
                  source_name=$(echo "$sources_json" | jq -r ".[$i].name")
                  source_url=$(echo "$sources_json" | jq -r ".[$i].source")
                  source_branch=$(echo "$sources_json" | jq -r ".[$i].branch")

                  # Only include devices that need to be built
                  # If SSH is enabled, only include the running_ssh_device
                  # If SSH is disabled, include all devices
                  if [ "${{ inputs.ssh }}" = "true" ] || [ "${{ inputs.only_ssh }}" = "true" ]; then
                    if [ "$device" = "${{ inputs.running_ssh_device }}" ]; then
                      matrix="$matrix{\"device\":\"$device\",\"ssh\":\"${{ inputs.ssh }}\",\"only_ssh\":\"${{ inputs.only_ssh }}\",\"source_name\":\"$source_name\",\"source_url\":\"$source_url\",\"source_branch\":\"$source_branch\"},"
                    fi
                  else
                    # SSH disabled, include all devices
                    matrix="$matrix{\"device\":\"$device\",\"ssh\":\"false\",\"only_ssh\":\"false\",\"source_name\":\"$source_name\",\"source_url\":\"$source_url\",\"source_branch\":\"$source_branch\"},"
                  fi
                done
              else
                echo "Warning: Device $device not found, skipping"
              fi
            done
            matrix=${matrix%,}  # Remove last comma
            matrix="$matrix]}"
            echo "$matrix"
          }

          if [ -n "${{ inputs.devices }}" ]; then
            # Manual device selection
            echo "Using manually specified devices: ${{ inputs.devices }}"
            IFS=',' read -ra DEVICE_ARRAY <<< "${{ inputs.devices }}"
            device_list=""
            for device in "${DEVICE_ARRAY[@]}"; do
              device=$(echo "$device" | xargs) # Trim whitespace
              device_list="$device_list $device"
            done
            matrix=$(generate_matrix "$device_list")
          else
            # Build all devices
            echo "Building all devices"
            matrix="{\"include\":["
            sources_json='${{ needs.resolve-sources.outputs.sources_json }}'
            sources_count=$(echo "$sources_json" | jq length)

            for d in */ ; do
              if [ "$d" = "STANDALONE_CONF/" ]; then
                continue
              fi
              device_name=${d%/}

              # 为每个源码配置生成设备矩阵
              for i in $(seq 0 $((sources_count - 1))); do
                source_name=$(echo "$sources_json" | jq -r ".[$i].name")
                source_url=$(echo "$sources_json" | jq -r ".[$i].source")
                source_branch=$(echo "$sources_json" | jq -r ".[$i].branch")

                # Only include devices that need to be built
                # If SSH is enabled, only include the running_ssh_device
                # If SSH is disabled, include all devices
                if [ "${{ inputs.ssh }}" = "true" ] || [ "${{ inputs.only_ssh }}" = "true" ]; then
                  if [ "$device_name" = "${{ inputs.running_ssh_device }}" ]; then
                    matrix="$matrix{\"device\":\"$device_name\",\"ssh\":\"${{ inputs.ssh }}\",\"only_ssh\":\"${{ inputs.only_ssh }}\",\"source_name\":\"$source_name\",\"source_url\":\"$source_url\",\"source_branch\":\"$source_branch\"},"
                  fi
                else
                  # SSH disabled, include all devices
                  matrix="$matrix{\"device\":\"$device_name\",\"ssh\":\"false\",\"only_ssh\":\"false\",\"source_name\":\"$source_name\",\"source_url\":\"$source_url\",\"source_branch\":\"$source_branch\"},"
                fi
              done
            done
            if [ -d "STANDALONE_CONF" ]; then
              cd STANDALONE_CONF
              for d in */ ; do
                device_name=${d%/}
                # 为每个源码配置生成设备矩阵
                for i in $(seq 0 $((sources_count - 1))); do
                  source_name=$(echo "$sources_json" | jq -r ".[$i].name")
                  source_url=$(echo "$sources_json" | jq -r ".[$i].source")
                  source_branch=$(echo "$sources_json" | jq -r ".[$i].branch")

                  # Only include devices that need to be built
                  # If SSH is enabled, only include the running_ssh_device
                  # If SSH is disabled, include all devices
                  if [ "${{ inputs.ssh }}" = "true" ] || [ "${{ inputs.only_ssh }}" = "true" ]; then
                    if [ "$device_name" = "${{ inputs.running_ssh_device }}" ]; then
                      matrix="$matrix{\"device\":\"$device_name\",\"ssh\":\"${{ inputs.ssh }}\",\"only_ssh\":\"${{ inputs.only_ssh }}\",\"source_name\":\"$source_name\",\"source_url\":\"$source_url\",\"source_branch\":\"$source_branch\"},"
                    fi
                  else
                    # SSH disabled, include all devices
                    matrix="$matrix{\"device\":\"$device_name\",\"ssh\":\"false\",\"only_ssh\":\"false\",\"source_name\":\"$source_name\",\"source_url\":\"$source_url\",\"source_branch\":\"$source_branch\"},"
                  fi
                done
              done
              cd ..
            fi
            matrix=${matrix%,}
            matrix="$matrix]}"
          fi

          cd ..
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Generated matrix: $matrix"

  trigger-build:
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Another Workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: ${{ inputs.trigger-build-event-type }}
          token: ${{ secrets.GITHUB_TOKEN }}
          client-payload: |-
            {
              "variables": {
                "DEVICE": "${{ matrix.device }}",
                "SOURCE_BRANCH": "${{ matrix.source_branch }}",
                "TOOLCHAIN_TAG": "${{ env.TOOLCHAIN_TAG }}",
                "APP_CONFIG": "${{ env.APP_CONFIG_PATH }}",
                "ssh": "${{ matrix.ssh }}",
                "only_ssh": "${{ matrix.only_ssh }}",
                "SOURCE_URL": "${{ matrix.source_url }}",
                "SOURCE_NAME": "${{ matrix.source_name }}",
                "running_ssh_device": "${{ inputs.running_ssh_device }}",
                "FIRMWARE_NAME": "${{ env.FIRMWARE_NAME }}",
                "RELEASE_TAG": "${{ env.RELEASE_TAG }}"
              }
            }
