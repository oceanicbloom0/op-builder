name: Generate Matrix

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式：debug = 调试模式（直接输入源码地址）；config = 从配置文件选择；all = 编译所有配置"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - config
          - all
      source_url:
        description: "源码地址（仅在 mode=debug 时使用）"
        required: false
        default: "https://github.com/coolsnowwolf/lede.git"
        type: string
      source_branch:
        description: "源码分支（仅在 mode=debug 时使用）"
        required: false
        default: "master"
        type: string
      debug_device:
        description: "调试模式设备名（仅在 mode=debug 时使用）。指定要编译的设备目录名。"
        required: false
        type: string
      config_name:
        description: "配置文件中的配置名（仅在 mode=config 时使用）。可为 'all' 表示全部。"
        required: false
        type: string
      app_config_path:
        description: "Path to the application configuration file"
        required: true
        default: "configs/app.config"
      device_mode:
        description: "设备选择模式：all = 所有设备；config = 从配置文件选择"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - config
      device_config:
        description: "设备配置名（仅在 device_mode=config 时使用）。可为 'all' 表示全部。"
        required: false
        type: string
      trigger-build-event-type:
        description: "Trigger build event type name"
        required: true
        default: "trigger-build-openwrt"
      ssh_mode:
        description: "SSH模式：none = 禁用SSH；enable = 启用SSH；only = 仅SSH模式"
        required: true
        default: "none"
        type: choice
        options:
          - none
          - enable
          - only
  repository_dispatch:
    types: [trigger-build-openwrt_main]

env:
  APP_CONFIG_PATH: ${{ inputs.app_config_path }}

jobs:
  resolve-configs:
    runs-on: ubuntu-22.04
    outputs:
      configs_json: ${{ steps.resolve-configs.outputs.configs_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh

      - name: Resolve sources and devices
        id: resolve-configs
        run: |
          # 解析源码和设备配置
          configs_json=$(./scripts/resolve-sources.sh \
            "${{ github.event.inputs.mode }}" \
            "${{ github.event.inputs.source_url }}" \
            "${{ github.event.inputs.source_branch }}" \
            "${{ github.event.inputs.config_name }}" \
            "${{ github.event.inputs.device_mode }}" \
            "${{ github.event.inputs.device_config }}" \
            "${{ github.event.inputs.debug_device }}")

          # 检查是否有错误
          if [ $? -ne 0 ]; then
            echo "Error: Failed to resolve sources and devices"
            exit 1
          fi

          echo "configs_json=$configs_json" >> $GITHUB_OUTPUT
          echo "Resolved configs:"
          echo "$configs_json"

  generate-matrix:
    needs: [resolve-configs]
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load environment config
        id: load-env
        run: |
          if [ ! -f "env.config" ]; then
            echo "Error: env.config file not found - this file is required"
            exit 1
          fi
          while IFS='=' read -r key value; do
            if [[ ! "$key" =~ ^# && -n "$key" ]]; then
              echo "$key=$value" >> $GITHUB_ENV
              echo "Loaded $key=$value"
            fi
          done < "env.config"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - id: set-matrix
        run: |
          # 获取源码和设备配置
          configs_json='${{ needs.resolve-configs.outputs.configs_json }}'

          echo "Configs JSON: $configs_json"

          # 提取源码和设备配置
          sources_json=$(echo "$configs_json" | jq -r '.sources')
          devices_json=$(echo "$configs_json" | jq -r '.devices')

          echo "Sources JSON: $sources_json"
          echo "Devices JSON: $devices_json"

          # 检查是否有源码和设备
          sources_count=$(echo "$sources_json" | jq length)
          devices_count=$(echo "$devices_json" | jq length)

          if [ "$sources_count" -eq 0 ]; then
            echo "Error: No sources found"
            exit 1
          fi

          if [ "$devices_count" -eq 0 ]; then
            echo "Error: No devices found"
            exit 1
          fi

          # 生成矩阵
          matrix="{\"include\":["

          # 遍历每个设备
          for device_index in $(seq 0 $((devices_count - 1))); do
            device_name=$(echo "$devices_json" | jq -r ".[$device_index].name")
            device_sources=$(echo "$devices_json" | jq -r ".[$device_index].sources")

            echo "Processing device: $device_name, preferred sources: $device_sources"

            # 验证设备是否存在
            if [ -d "configs/$device_name" ] || [ -d "configs/STANDALONE_CONF/$device_name" ]; then
              # 如果设备有指定的源码配置，优先使用指定的源码
              if [ -n "$device_sources" ] && [ "$device_sources" != "null" ] && [ "$device_sources" != "" ]; then
                # 将逗号分隔的源码列表转换为数组
                IFS=',' read -ra preferred_sources <<< "$device_sources"

                # 遍历指定的源码配置
                for preferred_source in "${preferred_sources[@]}"; do
                  preferred_source=$(echo "$preferred_source" | xargs) # 去除空格
                  source_found=false

                  for source_index in $(seq 0 $((sources_count - 1))); do
                    source_name=$(echo "$sources_json" | jq -r ".[$source_index].name")
                    if [ "$source_name" = "$preferred_source" ]; then
                      source_url=$(echo "$sources_json" | jq -r ".[$source_index].source")
                      source_branch=$(echo "$sources_json" | jq -r ".[$source_index].branch")

                      # 检查是否需要构建此设备
                      case "${{ inputs.ssh_mode }}" in
                        "none")
                          # SSH disabled, include device
                          matrix="$matrix{\"device\":\"$device_name\",\"ssh\":\"false\",\"only_ssh\":\"false\",\"source_name\":\"$source_name\",\"source_url\":\"$source_url\",\"source_branch\":\"$source_branch\"},"
                          source_found=true
                          ;;
                        "enable")
                          # SSH enabled, include all devices
                          matrix="$matrix{\"device\":\"$device_name\",\"ssh\":\"true\",\"only_ssh\":\"false\",\"source_name\":\"$source_name\",\"source_url\":\"$source_url\",\"source_branch\":\"$source_branch\"},"
                          source_found=true
                          ;;
                        "only")
                          # SSH only mode, only include x86-64 device
                          if [ "$device_name" = "x86-64" ]; then
                            matrix="$matrix{\"device\":\"$device_name\",\"ssh\":\"true\",\"only_ssh\":\"true\",\"source_name\":\"$source_name\",\"source_url\":\"$source_url\",\"source_branch\":\"$source_branch\"},"
                            source_found=true
                          fi
                          ;;
                      esac
                      break
                    fi
                  done

                  if [ "$source_found" = false ]; then
                    echo "Warning: Preferred source '$preferred_source' not found for device '$device_name'"
                  fi
                done
              else
                # 如果没有指定源码配置，使用所有源码配置
                for source_index in $(seq 0 $((sources_count - 1))); do
                  source_name=$(echo "$sources_json" | jq -r ".[$source_index].name")
                  source_url=$(echo "$sources_json" | jq -r ".[$source_index].source")
                  source_branch=$(echo "$sources_json" | jq -r ".[$source_index].branch")

                  # 检查是否需要构建此设备
                  case "${{ inputs.ssh_mode }}" in
                    "none")
                      # SSH disabled, include all devices
                      matrix="$matrix{\"device\":\"$device_name\",\"ssh\":\"false\",\"only_ssh\":\"false\",\"source_name\":\"$source_name\",\"source_url\":\"$source_url\",\"source_branch\":\"$source_branch\"},"
                      ;;
                    "enable")
                      # SSH enabled, include all devices
                      matrix="$matrix{\"device\":\"$device_name\",\"ssh\":\"true\",\"only_ssh\":\"false\",\"source_name\":\"$source_name\",\"source_url\":\"$source_url\",\"source_branch\":\"$source_branch\"},"
                      ;;
                    "only")
                      # SSH only mode, only include x86-64 device
                      if [ "$device_name" = "x86-64" ]; then
                        matrix="$matrix{\"device\":\"$device_name\",\"ssh\":\"true\",\"only_ssh\":\"true\",\"source_name\":\"$source_name\",\"source_url\":\"$source_url\",\"source_branch\":\"$source_branch\"},"
                      fi
                      ;;
                  esac
                done
              fi
            else
              echo "Warning: Device $device_name not found, skipping"
            fi
          done

          matrix=${matrix%,}  # Remove last comma
          matrix="$matrix]}"

          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Generated matrix: $matrix"

  trigger-build:
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Another Workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: ${{ inputs.trigger-build-event-type }}
          token: ${{ secrets.GITHUB_TOKEN }}
          client-payload: |-
            {
              "variables": {
                "DEVICE": "${{ matrix.device }}",
                "SOURCE_BRANCH": "${{ matrix.source_branch }}",
                "TOOLCHAIN_TAG": "${{ env.TOOLCHAIN_TAG }}",
                "APP_CONFIG": "${{ env.APP_CONFIG_PATH }}",
                "ssh": "${{ matrix.ssh }}",
                "only_ssh": "${{ matrix.only_ssh }}",
                "SOURCE_URL": "${{ matrix.source_url }}",
                "SOURCE_NAME": "${{ matrix.source_name }}",
                "FIRMWARE_NAME": "${{ env.FIRMWARE_NAME }}",
                "RELEASE_TAG": "${{ env.RELEASE_TAG }}"
              }
            }
