name: Build OpenWrt => Docker

on:
  workflow_dispatch:
    inputs:
      openwrt_source:
        description: "OpenWRT source repository"
        required: true
        default: "https://github.com/coolsnowwolf/lede"

      openwrt_source_branch:
        description: "Branch of the OpenWRT source repository"
        required: true
        default: "master"

      app_config_path:
        description: "Path to the application configuration file"
        required: true
        default: "configs/app.config"

      TOOLCHAIN_TAG:
        description: "Release tag used to store or retrieve the toolchain"
        required: true
        default: "Toolchain"

      ssh:
        description: "Enable SSH"
        required: true
        type: boolean

      only_ssh:
        description: "Use SSH only"
        required: true
        type: boolean

      running_ssh_device:
        description: "Name of the device where SSH is running"
        required: true
        default: "x86-64"
        
      rebuild_toolchain:
        description: "Force rebuild toolchain image"
        required: false
        type: boolean
        default: false
        
      rebuild_packages:
        description: "Force rebuild packages image"
        required: false
        type: boolean
        default: false

env:
  SOURCE_URL: ${{ inputs.openwrt_source }}
  SOURCE_BRANCH: ${{ inputs.openwrt_source_branch }}
  TOOLCHAIN_TAG: ${{ inputs.TOOLCHAIN_TAG }}
  APP_CONFIG: ${{ inputs.app_config_path }}
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/openwrt

jobs:
  generate-matrix:
    runs-on: ubuntu-22.04
    env:
      openwrt_source: ${{ inputs.openwrt_source }}
      openwrt_source_branch: ${{ inputs.openwrt_source_branch }}
      app_config_path: ${{ inputs.app_config_path }}
      TOOLCHAIN_TAG: ${{ inputs.TOOLCHAIN_TAG }}
      ssh: ${{ inputs.ssh }}
      only_ssh: ${{ inputs.only_ssh }}
      running_ssh_device: ${{ inputs.running_ssh_device }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: set-matrix
        run: |
          cd configs
          matrix="{\"include\":["
              
          for d in */ ; do
              if [ "$d" = "STANDALONE_CONF/" ]; then
                  continue
              fi
              device_name=${d%/}
              matrix="$matrix{\"device\":\"$device_name\"},"
          done
              
          if [ -d "STANDALONE_CONF" ]; then
              cd STANDALONE_CONF
              for d in */ ; do
                  device_name=${d%/}
                  matrix="$matrix{\"device\":\"$device_name\"},"
              done
              cd ..
          fi
              
          matrix=${matrix%,}
          matrix="$matrix]}"
              
          cd ..
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo $matrix


  build-cache-layers:
    needs: [generate-matrix]
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate-matrix.outputs.matrix)}}
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate hash values
        id: hash
        run: |
          # Calculate hash of toolchain-related files
          echo "SOURCE_REPO=$(echo '${{ inputs.openwrt_source }}' | awk -F '/' '{print $(NF)}')" >> $GITHUB_ENV
          
          # Clone repo to get hashes
          git clone ${{ inputs.openwrt_source }} -b ${{ inputs.openwrt_source_branch }} openwrt
          cd openwrt
          
          # Get toolchain hash
          TOOLCHAIN_HASH=$(git log --pretty=tformat:"%H" -n1 tools toolchain)
          echo "TOOLCHAIN_HASH=${TOOLCHAIN_HASH:0:8}" >> $GITHUB_ENV
          
          # For packages, hash of device config + feeds
          cd ../configs/${{ matrix.device }}
          CONFIG_HASH=$(find . -type f -exec md5sum {} \; | sort | md5sum | awk '{print $1}')
          echo "CONFIG_HASH=${CONFIG_HASH:0:8}" >> $GITHUB_ENV
          
          cd ../..
          echo "Device: ${{ matrix.device }}, Toolchain Hash: ${TOOLCHAIN_HASH:0:8}, Config Hash: ${CONFIG_HASH:0:8}"

      - name: Verify Dockerfile exists
        run: |
          if [ ! -f "build-libs/Dockerfile" ]; then
            echo "Error: Dockerfile not found in build-libs directory"
            exit 1
          fi
          echo "Verifying targets in Dockerfile..."
          grep -E "^FROM .* AS .*" build-libs/Dockerfile

      - name: Check for existing images
        id: check-images
        run: |
          TOOLCHAIN_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-toolchain-${{ matrix.device }}:${{ env.TOOLCHAIN_HASH }}"
          PACKAGES_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-packages-${{ matrix.device }}:${{ env.CONFIG_HASH }}"
          FIRMWARE_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-firmware-${{ matrix.device }}:${{ env.CONFIG_HASH }}"
          
          echo "TOOLCHAIN_IMAGE=$TOOLCHAIN_IMAGE" >> $GITHUB_ENV
          echo "PACKAGES_IMAGE=$PACKAGES_IMAGE" >> $GITHUB_ENV
          echo "FIRMWARE_IMAGE=$FIRMWARE_IMAGE" >> $GITHUB_ENV
          
          # Check if images exist
          if docker pull $TOOLCHAIN_IMAGE 2>/dev/null; then
            echo "TOOLCHAIN_EXISTS=true" >> $GITHUB_ENV
          else
            echo "TOOLCHAIN_EXISTS=false" >> $GITHUB_ENV
          fi
          
          if docker pull $PACKAGES_IMAGE 2>/dev/null; then
            echo "PACKAGES_EXISTS=true" >> $GITHUB_ENV
          else
            echo "PACKAGES_EXISTS=false" >> $GITHUB_ENV
          fi
          
          if docker pull $FIRMWARE_IMAGE 2>/dev/null; then
            echo "FIRMWARE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "FIRMWARE_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Build toolchain image
        if: env.TOOLCHAIN_EXISTS == 'false' || inputs.rebuild_toolchain == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build-libs/Dockerfile
          push: true
          tags: ${{ env.TOOLCHAIN_IMAGE }}
          target: toolchain
          build-args: |
            SOURCE_URL=${{ inputs.openwrt_source }}
            SOURCE_BRANCH=${{ inputs.openwrt_source_branch }}
            DEVICE=${{ matrix.device }}

      - name: Build packages image
        if: env.PACKAGES_EXISTS == 'false' || inputs.rebuild_packages == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build-libs/Dockerfile
          push: true
          tags: ${{ env.PACKAGES_IMAGE }}
          target: packages
          build-args: |
            SOURCE_URL=${{ inputs.openwrt_source }}
            SOURCE_BRANCH=${{ inputs.openwrt_source_branch }}
            DEVICE=${{ matrix.device }}
          cache-from: |
            ${{ env.TOOLCHAIN_IMAGE }}

      - name: Extract packages
        if: env.PACKAGES_EXISTS == 'true' && env.FIRMWARE_EXISTS == 'false'
        run: |
          # Create a container from packages image
          docker create --name packages-${{ matrix.device }} ${{ env.PACKAGES_IMAGE }}
          
          # Extract packages to workspace
          mkdir -p packages
          docker cp packages-${{ matrix.device }}:/packages ./packages
          
          # Clean up
          docker rm packages-${{ matrix.device }}
          
          echo "Packages extracted successfully"
          ls -la packages

      - name: Build firmware image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build-libs/Dockerfile
          push: true
          tags: ${{ env.FIRMWARE_IMAGE }}
          target: firmware
          build-args: |
            SOURCE_URL=${{ inputs.openwrt_source }}
            SOURCE_BRANCH=${{ inputs.openwrt_source_branch }}
            DEVICE=${{ matrix.device }}
          cache-from: |
            ${{ env.TOOLCHAIN_IMAGE }}
            ${{ env.PACKAGES_IMAGE }}

      - name: Extract firmware
        run: |
          # Create a container from firmware image
          docker create --name firmware-${{ matrix.device }} ${{ env.FIRMWARE_IMAGE }}
          
          # Create directory for firmware
          mkdir -p firmware-${{ matrix.device }}
          
          # Extract firmware to workspace
          docker cp firmware-${{ matrix.device }}:/firmware ./firmware-${{ matrix.device }}
          
          # Clean up
          docker rm firmware-${{ matrix.device }}
          
          echo "Firmware extracted successfully"
          ls -la firmware-${{ matrix.device }}

      - name: Calculate build time
        run: |
          # Calculate build time
          START_TIME=$(docker inspect --format='{{.Created}}' ${{ env.TOOLCHAIN_IMAGE }} | date -f - +%s)
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          
          echo "BUILD_DURATION=${MINUTES} minutes and ${SECONDS} seconds" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
          echo "RELEASE_TAG=${{ matrix.device }}-$(date +'%Y.%m.%d')-docker" >> $GITHUB_ENV

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: "${{ env.DATE }} | ${{ matrix.device }} | Docker Build"
          tag_name: ${{ env.RELEASE_TAG }}
          body: |
            Device: ${{ matrix.device }}
            The build took ${{ env.BUILD_DURATION }}.
            
            Toolchain Image: ${{ env.TOOLCHAIN_IMAGE }}
            Packages Image: ${{ env.PACKAGES_IMAGE }}
            Firmware Image: ${{ env.FIRMWARE_IMAGE }}
          files: firmware-${{ matrix.device }}/*

      - name: SSH for debugging
        if: ${{ inputs.ssh == true && matrix.device == inputs.running_ssh_device }}
        env:
          CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_TOKEN }}
        run: |
          /bin/bash scripts/ssh.sh

      - uses: otto-de/purge-deprecated-workflow-runs@v2
        with:
          remove-failed: true
          remove-cancelled: true
          remove-skipped: true

      - name: Delete Older Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 7
          delete_tag_pattern: docker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 