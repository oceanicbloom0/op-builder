name: Build OpenWrt => Docker

on:
  workflow_dispatch:
    inputs:
      openwrt_source:
        description: "OpenWRT source repository"
        required: true
        default: "https://github.com/coolsnowwolf/lede"

      openwrt_source_branch:
        description: "Branch of the OpenWRT source repository"
        required: true
        default: "master"

      app_config_path:
        description: "Path to the application configuration file"
        required: true
        default: "configs/app.config"

      TOOLCHAIN_TAG:
        description: "Release tag used to store or retrieve the toolchain"
        required: true
        default: "Toolchain"

      ssh:
        description: "Enable SSH"
        required: true
        type: boolean

      only_ssh:
        description: "Use SSH only"
        required: true
        type: boolean

      running_ssh_device:
        description: "Name of the device where SSH is running"
        required: true
        default: "x86-64"
        
      rebuild_toolchain:
        description: "Force rebuild toolchain image"
        required: false
        type: boolean
        default: false
        
      rebuild_packages:
        description: "Force rebuild packages image"
        required: false
        type: boolean
        default: false

env:
  SOURCE_URL: ${{ inputs.openwrt_source }}
  SOURCE_BRANCH: ${{ inputs.openwrt_source_branch }}
  TOOLCHAIN_TAG: ${{ inputs.TOOLCHAIN_TAG }}
  APP_CONFIG: ${{ inputs.app_config_path }}
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/openwrt

jobs:
  generate-matrix:
    runs-on: ubuntu-22.04
    env:
      openwrt_source: ${{ inputs.openwrt_source }}
      openwrt_source_branch: ${{ inputs.openwrt_source_branch }}
      app_config_path: ${{ inputs.app_config_path }}
      TOOLCHAIN_TAG: ${{ inputs.TOOLCHAIN_TAG }}
      ssh: ${{ inputs.ssh }}
      only_ssh: ${{ inputs.only_ssh }}
      running_ssh_device: ${{ inputs.running_ssh_device }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: set-matrix
        run: |
          cd configs
          matrix="{\"include\":["
              
          for d in */ ; do
              if [ "$d" = "STANDALONE_CONF/" ]; then
                  continue
              fi
              device_name=${d%/}
              matrix="$matrix{\"device\":\"$device_name\"},"
          done
              
          if [ -d "STANDALONE_CONF" ]; then
              cd STANDALONE_CONF
              for d in */ ; do
                  device_name=${d%/}
                  matrix="$matrix{\"device\":\"$device_name\"},"
              done
              cd ..
          fi
              
          matrix=${matrix%,}
          matrix="$matrix]}"
              
          cd ..
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo $matrix

  prepare-dockerfile:
    runs-on: ubuntu-22.04
    needs: generate-matrix
    outputs:
      dockerfile_path: ${{ steps.create-dockerfile.outputs.dockerfile_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Create Dockerfile
        id: create-dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          # Base stage with build dependencies
          FROM ubuntu:22.04 AS base
          
          # Set non-interactive mode for apt
          ENV DEBIAN_FRONTEND=noninteractive
          
          # Install basic dependencies
          RUN apt-get update && apt-get install -y \
              ack antlr3 aria2 asciidoc autoconf automake autopoint binutils bison build-essential \
              bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
              git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
              libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
              mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip libpython3-dev qemu-utils \
              rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev python3-pyelftools \
              aria2 clang clangd ecj lib32gcc-s1 libfuse-dev libncursesw5 libpython3-dev lld lldb python3-ply re2c \
          && apt-get clean \
          && rm -rf /var/lib/apt/lists/* \
          && update-ca-certificates

          # Set timezone
          RUN ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime

          # Toolchain stage
          FROM base AS toolchain
          
          ARG SOURCE_URL
          ARG SOURCE_BRANCH
          ARG DEVICE
          ARG GITHUB_WORKSPACE=/workspace
          
          WORKDIR /workspace
          
          # Clone OpenWrt source code
          RUN git clone ${SOURCE_URL} -b ${SOURCE_BRANCH} openwrt
          
          # Copy configuration files
          COPY . /workspace/
          
          # Set up configuration for toolchain
          WORKDIR /workspace/openwrt
          
          # Generate toolchain config
          RUN bash /workspace/scripts/openwrt/copy-config.sh \
              && make defconfig \
              && sed -i '/CONFIG_DEFAULT_luci/'d .config \
              && echo -e "\nCONFIG_ALL=y" >> .config \
              && echo -e "\nCONFIG_ALL_NONSHARED=y" >> .config \
              && make defconfig > /dev/null 2>&1
              
          # Update and install feeds
          RUN ./scripts/feeds update -a \
              && ./scripts/feeds install -a
              
          # Compile toolchain and tools
          RUN make defconfig \
              && make tools/compile -j$(nproc) || make tools/compile -j1 V=s \
              && make toolchain/compile -j$(nproc) || make toolchain/compile -j1 V=s
              
          # Clean up unnecessary files
          RUN rm -rf .config* dl bin
          
          # Packages stage
          FROM toolchain AS packages
          
          ARG DEVICE
          ARG GITHUB_WORKSPACE=/workspace
          
          WORKDIR /workspace/openwrt
          
          # Add packages
          RUN chmod +x /workspace/scripts/openwrt/add-package.sh \
              && /workspace/scripts/openwrt/add-package.sh \
              && ./scripts/feeds update -a \
              && ./scripts/feeds install -a
              
          # Update configuration
          RUN bash /workspace/scripts/openwrt/copy-config.sh \
              && sed -i '/CONFIG_DEFAULT_luci/'d .config \
              && make defconfig
              
          # Download packages
          RUN make download -j8
              
          # Copy files if present
          RUN if [ -n "$(ls -A "/workspace/files" 2>/dev/null)" ]; then \
                  cp -Rf /workspace/files/* ./ ; \
              fi
              
          # Compile packages
          RUN make diffconfig \
              && make target/compile -j$(nproc) IGNORE_ERRORS="m n" BUILD_LOG=1 || yes n | make target/compile -j1 V=s IGNORE_ERRORS=1 \
              && make package/compile -j$(nproc) IGNORE_ERRORS=1 || make package/compile -j1 V=s IGNORE_ERRORS=1 \
              && make package/index
          
          # Firmware stage
          FROM packages AS firmware
          
          ARG DEVICE
          ARG GITHUB_WORKSPACE=/workspace
          
          WORKDIR /workspace/openwrt
          
          # Create defaults directory
          RUN mkdir -p files/etc/uci-defaults \
              && cp /workspace/scripts/openwrt/init-settings.sh files/etc/uci-defaults/99-init-settings
              
          # Generate firmware
          RUN make package/install -j$(nproc) || make package/install -j1 V=s \
              && make target/install -j$(nproc) || make target/install -j1 V=s \
              && make json_overview_image_info \
              && make checksum
              
          # Clean up unnecessary files
          RUN cd bin/targets/*/* \
              && rm -rf packages sha256* *manifest *.sha *info *kernel.bin *sha *json
          
          # Prepare workspace for artifacts  
          WORKDIR /workspace
          
          # Create a directory for artifacts
          RUN mkdir -p /artifacts \
              && cp -r openwrt/bin/targets/*/* /artifacts/ \
              && cp -r openwrt/bin/packages /artifacts/packages
          
          # Output stage for packages only
          FROM scratch AS output-packages
          COPY --from=packages /workspace/openwrt/bin/packages /packages
          
          # Output stage for firmware only
          FROM scratch AS output-firmware
          COPY --from=firmware /artifacts /firmware
          EOF
          
          echo "dockerfile_path=Dockerfile" >> $GITHUB_OUTPUT

  login-ghcr:
    runs-on: ubuntu-22.04
    needs: [generate-matrix, prepare-dockerfile]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  build-cache-layers:
    needs: [generate-matrix, prepare-dockerfile, login-ghcr]
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate-matrix.outputs.matrix)}}
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate hash values
        id: hash
        run: |
          # Calculate hash of toolchain-related files
          echo "SOURCE_REPO=$(echo '${{ inputs.openwrt_source }}' | awk -F '/' '{print $(NF)}')" >> $GITHUB_ENV
          
          # Clone repo to get hashes
          git clone ${{ inputs.openwrt_source }} -b ${{ inputs.openwrt_source_branch }} openwrt
          cd openwrt
          
          # Get toolchain hash
          TOOLCHAIN_HASH=$(git log --pretty=tformat:"%H" -n1 tools toolchain)
          echo "TOOLCHAIN_HASH=${TOOLCHAIN_HASH:0:8}" >> $GITHUB_ENV
          
          # For packages, hash of device config + feeds
          cd ../configs/${{ matrix.device }}
          CONFIG_HASH=$(find . -type f -exec md5sum {} \; | sort | md5sum | awk '{print $1}')
          echo "CONFIG_HASH=${CONFIG_HASH:0:8}" >> $GITHUB_ENV
          
          cd ../..
          echo "Device: ${{ matrix.device }}, Toolchain Hash: ${TOOLCHAIN_HASH:0:8}, Config Hash: ${CONFIG_HASH:0:8}"

      - name: Check for existing images
        id: check-images
        run: |
          TOOLCHAIN_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-toolchain-${{ matrix.device }}:${{ env.TOOLCHAIN_HASH }}"
          PACKAGES_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-packages-${{ matrix.device }}:${{ env.CONFIG_HASH }}"
          FIRMWARE_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-firmware-${{ matrix.device }}:${{ env.CONFIG_HASH }}"
          
          echo "TOOLCHAIN_IMAGE=$TOOLCHAIN_IMAGE" >> $GITHUB_ENV
          echo "PACKAGES_IMAGE=$PACKAGES_IMAGE" >> $GITHUB_ENV
          echo "FIRMWARE_IMAGE=$FIRMWARE_IMAGE" >> $GITHUB_ENV
          
          # Check if images exist
          if docker pull $TOOLCHAIN_IMAGE 2>/dev/null; then
            echo "TOOLCHAIN_EXISTS=true" >> $GITHUB_ENV
          else
            echo "TOOLCHAIN_EXISTS=false" >> $GITHUB_ENV
          fi
          
          if docker pull $PACKAGES_IMAGE 2>/dev/null; then
            echo "PACKAGES_EXISTS=true" >> $GITHUB_ENV
          else
            echo "PACKAGES_EXISTS=false" >> $GITHUB_ENV
          fi
          
          if docker pull $FIRMWARE_IMAGE 2>/dev/null; then
            echo "FIRMWARE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "FIRMWARE_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Build toolchain image
        if: env.TOOLCHAIN_EXISTS == 'false' || inputs.rebuild_toolchain == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ needs.prepare-dockerfile.outputs.dockerfile_path }}
          push: true
          tags: ${{ env.TOOLCHAIN_IMAGE }}
          target: toolchain
          build-args: |
            SOURCE_URL=${{ inputs.openwrt_source }}
            SOURCE_BRANCH=${{ inputs.openwrt_source_branch }}
            DEVICE=${{ matrix.device }}

      - name: Build packages image
        if: env.PACKAGES_EXISTS == 'false' || inputs.rebuild_packages == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ needs.prepare-dockerfile.outputs.dockerfile_path }}
          push: true
          tags: ${{ env.PACKAGES_IMAGE }}
          target: packages
          build-args: |
            SOURCE_URL=${{ inputs.openwrt_source }}
            SOURCE_BRANCH=${{ inputs.openwrt_source_branch }}
            DEVICE=${{ matrix.device }}
          cache-from: |
            ${{ env.TOOLCHAIN_IMAGE }}

      - name: Extract packages
        if: env.PACKAGES_EXISTS == 'true' && env.FIRMWARE_EXISTS == 'false'
        run: |
          # Create a container from packages image
          docker create --name packages-${{ matrix.device }} ${{ env.PACKAGES_IMAGE }}
          
          # Extract packages to workspace
          mkdir -p packages
          docker cp packages-${{ matrix.device }}:/packages ./packages
          
          # Clean up
          docker rm packages-${{ matrix.device }}
          
          echo "Packages extracted successfully"
          ls -la packages

      - name: Build firmware image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ needs.prepare-dockerfile.outputs.dockerfile_path }}
          push: true
          tags: ${{ env.FIRMWARE_IMAGE }}
          target: firmware
          build-args: |
            SOURCE_URL=${{ inputs.openwrt_source }}
            SOURCE_BRANCH=${{ inputs.openwrt_source_branch }}
            DEVICE=${{ matrix.device }}
          cache-from: |
            ${{ env.TOOLCHAIN_IMAGE }}
            ${{ env.PACKAGES_IMAGE }}

      - name: Extract firmware
        run: |
          # Create a container from firmware image
          docker create --name firmware-${{ matrix.device }} ${{ env.FIRMWARE_IMAGE }}
          
          # Create directory for firmware
          mkdir -p firmware-${{ matrix.device }}
          
          # Extract firmware to workspace
          docker cp firmware-${{ matrix.device }}:/firmware ./firmware-${{ matrix.device }}
          
          # Clean up
          docker rm firmware-${{ matrix.device }}
          
          echo "Firmware extracted successfully"
          ls -la firmware-${{ matrix.device }}

      - name: Calculate build time
        run: |
          # Calculate build time
          START_TIME=$(docker inspect --format='{{.Created}}' ${{ env.TOOLCHAIN_IMAGE }} | date -f - +%s)
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          
          echo "BUILD_DURATION=${MINUTES} minutes and ${SECONDS} seconds" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
          echo "RELEASE_TAG=${{ matrix.device }}-$(date +'%Y.%m.%d')-docker" >> $GITHUB_ENV

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: "${{ env.DATE }} | ${{ matrix.device }} | Docker Build"
          tag_name: ${{ env.RELEASE_TAG }}
          body: |
            Device: ${{ matrix.device }}
            The build took ${{ env.BUILD_DURATION }}.
            
            Toolchain Image: ${{ env.TOOLCHAIN_IMAGE }}
            Packages Image: ${{ env.PACKAGES_IMAGE }}
            Firmware Image: ${{ env.FIRMWARE_IMAGE }}
          files: firmware-${{ matrix.device }}/*

      - name: SSH for debugging
        if: ${{ inputs.ssh == true && matrix.device == inputs.running_ssh_device }}
        env:
          CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_TOKEN }}
        run: |
          /bin/bash scripts/ssh.sh

      - uses: otto-de/purge-deprecated-workflow-runs@v2
        with:
          remove-failed: true
          remove-cancelled: true
          remove-skipped: true

      - name: Delete Older Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 7
          delete_tag_pattern: docker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 