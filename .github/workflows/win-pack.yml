name: Win Pack

on:
  pull_request:
    paths:
      - ".github/workflows/win-pack.yml"
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner type"
        required: true
        default: "windows-2025"
        type: choice
        options:
          - windows-2022
          - windows-2025
          - windows-2025-vs2026
      test_mode:
        description: "Test mode (only build, skip deploy)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      windows_version:
        description: "Windows version"
        required: true
        default: "11"
        type: choice
        options:
          - "10"
          - "11"
      windows_edition:
        description: "Windows edition"
        required: true
        default: "Consumer"
        type: choice
        options:
          - "Consumer"
          - "LTSC"
      windows_language:
        description: "Windows language code"
        required: true
        default: "zh-cn"
        type: choice
        options:
          - "zh-cn"
          - "en-us"
      image_index:
        description: "WIM image index"
        required: true
        default: "1"
      package_iso:
        description: "Also build ISO from auto-downloaded source"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
      use_esd_compression:
        description: "Use ESD compression for smaller ISO size (slower)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      source_iso_path:
        description: "Custom source ISO path (leave empty to auto-download)"
        required: false
        default: ""
      software_urls:
        description: "Extra installer URLs (newline or comma separated)"
        required: false
        default: ""
      software_silent_args:
        description: "Silent install args for extra EXE/MSI"
        required: false
        default: "/quiet /norestart"
      output_wim_name:
        description: "Output WIM filename"
        required: true
        default: "custom-install.wim"
      output_iso_name:
        description: "Output ISO filename (if package_iso=true)"
        required: true
        default: "custom-install.iso"
      include_office_payload:
        description: "Bundle Office offline payload into image (large size impact)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  pack:
    runs-on: ${{ github.event.inputs.runner || 'windows-2022' }}

    steps:
      - name: Prepare directories
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = if (Test-Path "D:\") { "D:" } else { "C:" }
          Write-Host "Using work root: $root"
          "WORK_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          New-Item -ItemType Directory -Path "$root\input" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\wim" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\iso-src" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\mount" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\software" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\office-tool" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\office-offline" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\output" -Force | Out-Null

      - name: Clone ext-repo
        shell: pwsh
        env:
          ACTION_RSA: ${{ secrets.ACTION_RSA }}
          EXT_REPO: ${{ secrets.EXT_REPO }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT

          $sshDir = Join-Path $env:USERPROFILE ".ssh"
          New-Item -ItemType Directory -Path $sshDir -Force | Out-Null
          $sshPath = Join-Path $sshDir "id_rsa"
          [System.IO.File]::WriteAllText($sshPath, "$env:ACTION_RSA`n")
          icacls $sshPath /c /t /inheritance:d | Out-Null
          icacls $sshPath /c /t /grant:r "$($env:USERNAME):F" | Out-Null
          icacls $sshPath /c /t /remove:g "Administrator" "Authenticated Users" "Users" "Everyone" | Out-Null
          git config --global core.sshCommand "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          $extDir = "$root\ext-repo"
          New-Item -ItemType Directory -Path $extDir -Force | Out-Null
          Set-Location $extDir
          git init
          git remote add origin "git@github.com:$($env:EXT_REPO).git"
          git fetch origin
          git checkout -t origin/main

      - name: Build Windows image
        shell: pwsh
        env:
          WINDOWS_VERSION: ${{ github.event.inputs.windows_version }}
          WINDOWS_EDITION: ${{ github.event.inputs.windows_edition }}
          WINDOWS_LANGUAGE: ${{ github.event.inputs.windows_language }}
          IMAGE_INDEX: ${{ github.event.inputs.image_index }}
          PACKAGE_ISO: ${{ github.event.inputs.package_iso }}
          USE_ESD_COMPRESSION: ${{ github.event.inputs.use_esd_compression }}
          SOURCE_ISO_PATH: ${{ github.event.inputs.source_iso_path }}
          OUTPUT_WIM_NAME: ${{ github.event.inputs.output_wim_name }}
          OUTPUT_ISO_NAME: ${{ github.event.inputs.output_iso_name }}
          INCLUDE_OFFICE_PAYLOAD: ${{ github.event.inputs.include_office_payload }}
          SOFTWARE_SILENT_ARGS: ${{ github.event.inputs.software_silent_args }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $buildScript = "$root\ext-repo\win\Build-Windows.ps1"

          & $buildScript `
            -WorkRoot $root `
            -WindowsVersion $env:WINDOWS_VERSION `
            -WindowsEdition $env:WINDOWS_EDITION `
            -WindowsLanguage $env:WINDOWS_LANGUAGE `
            -ImageIndex $env:IMAGE_INDEX `
            -OutputWimName $env:OUTPUT_WIM_NAME `
            -OutputIsoName $env:OUTPUT_ISO_NAME `
            -IncludeOfficePayload ($env:INCLUDE_OFFICE_PAYLOAD -eq "true") `
            -PackageIso ($env:PACKAGE_ISO -eq "true") `
            -UseEsdCompression ($env:USE_ESD_COMPRESSION -eq "true") `
            -SourceIsoPath $env:SOURCE_ISO_PATH `
            -SoftwareSilentArgs $env:SOFTWARE_SILENT_ARGS

      - name: Deploy
        if: github.event.inputs.test_mode != 'true'
        shell: pwsh
        env:
          ACTION_RSA: ${{ secrets.ACTION_RSA }}
          EXT_REPO: ${{ secrets.EXT_REPO }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $deployScript = "$root\ext-repo\win\Deploy.ps1"

          & $deployScript

      - name: Compress files
        if: github.event.inputs.test_mode != 'true'
        shell: pwsh
        run: |
          while ($true) {
            Start-Sleep -Seconds 300
          }
