name: Win Pack

on:
  #push:
  #  paths:
  #    - ".github/workflows/win-pack.yml"
  pull_request:
    paths:
      - ".github/workflows/win-pack.yml"
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner type"
        required: true
        default: "windows-2025"
        type: choice
        options:
          - windows-2022
          - windows-2025
      image_index:
        description: "WIM image index"
        required: true
        default: "4"
      apply_microwin:
        description: "Apply MicroWin (pinned winutil commit)"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      package_iso:
        description: "Also build ISO from auto-downloaded Win11 25H2 source"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      software_urls:
        description: "Extra installer URLs (newline or comma separated)"
        required: false
        default: ""
      software_silent_args:
        description: "Silent install args for extra EXE/MSI"
        required: false
        default: "/quiet /norestart"
      output_wim_name:
        description: "Output WIM filename"
        required: true
        default: "custom-install.wim"
      output_iso_name:
        description: "Output ISO filename (if package_iso=true)"
        required: true
        default: "custom-install.iso"
      include_office_payload:
        description: "Bundle Office offline payload into image (large size impact)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      test_wim_installation:
        description: "Test WIM installation using QEMU/KVM on Linux runner (slower)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  pack:
    runs-on: ${{ github.event.inputs.runner || 'windows-2022' }}

    steps:
      - name: Prepare directories
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = if (Test-Path "D:\") { "D:" } else { "C:" }
          Write-Host "Using work root: $root"
          "WORK_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          New-Item -ItemType Directory -Path "$root\input" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\wim" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\iso-src" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\mount" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\software" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\office-tool" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\office-offline" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\output" -Force | Out-Null

      - name: Clone ext-repo repo
        shell: pwsh
        env:
          ACTION_RSA: ${{ secrets.ACTION_RSA }}
          EXT_REPO: ${{ secrets.EXT_REPO }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT

          $sshDir = Join-Path $env:USERPROFILE ".ssh"
          New-Item -ItemType Directory -Path $sshDir -Force | Out-Null
          $sshPath = Join-Path $sshDir "id_rsa"
          [System.IO.File]::WriteAllText($sshPath, "$env:ACTION_RSA`n")
          icacls $sshPath /c /t /inheritance:d | Out-Null
          icacls $sshPath /c /t /grant:r "$($env:USERNAME):F" | Out-Null
          icacls $sshPath /c /t /remove:g "Administrator" "Authenticated Users" "Users" "Everyone" | Out-Null
          git config --global core.sshCommand "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          $sshLibsDir = "$root\ext-repo"
          New-Item -ItemType Directory -Path $sshLibsDir -Force | Out-Null
          Set-Location $sshLibsDir
          git init
          git remote add origin "git@github.com:$($env:EXT_REPO).git"
          git fetch origin
          git checkout -t origin/main

      - name: Self-test Pro index script
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $proIndexScript = "$root\ext-repo\win\Get-ProEditionIndex.ps1"
          if (-not (Test-Path $proIndexScript)) {
            throw "Get-ProEditionIndex.ps1 not found: $proIndexScript"
          }
          $result = (& $proIndexScript -SelfTest | Out-String).Trim()
          if ($result -ne "OK") {
            throw "Self-test failed, expected OK but got: '$result'"
          }
          Write-Host "Pro index script self-test passed."

          $injectScript = "$root\ext-repo\win\Inject-DefenderRemover.ps1"
          if (-not (Test-Path $injectScript)) {
            throw "Inject-DefenderRemover.ps1 not found: $injectScript"
          }
          $result = (& $injectScript -SelfTest | Out-String).Trim()
          if ($result -ne "OK") {
            throw "Self-test failed, expected OK but got: '$result'"
          }
          Write-Host "Inject-DefenderRemover script self-test passed."

          $writeScript = "$root\ext-repo\win\Write-SetupComplete.ps1"
          if (-not (Test-Path $writeScript)) {
            throw "Write-SetupComplete.ps1 not found: $writeScript"
          }
          $result = (& $writeScript -SelfTest | Out-String).Trim()
          if ($result -ne "OK") {
            throw "Self-test failed, expected OK but got: '$result'"
          }
          Write-Host "Write-SetupComplete script self-test passed."

          $protectScript = "$root\ext-repo\win\Protect-BootFiles.ps1"
          if (-not (Test-Path $protectScript)) {
            throw "Protect-BootFiles.ps1 not found: $protectScript"
          }
          $result = (& $protectScript -SelfTest | Out-String).Trim()
          if ($result -ne "OK") {
            throw "Self-test failed, expected OK but got: '$result'"
          }
          Write-Host "Protect-BootFiles script self-test passed."

          $testBootScript = "$root\ext-repo\win\Test-BootFiles.ps1"
          if (-not (Test-Path $testBootScript)) {
            throw "Test-BootFiles.ps1 not found: $testBootScript"
          }
          $result = (& $testBootScript -SelfTest | Out-String).Trim()
          if ($result -ne "OK") {
            throw "Self-test failed, expected OK but got: '$result'"
          }
          Write-Host "Test-BootFiles script self-test passed."

          $testWimScript = "$root\ext-repo\win\Test-WimInstallation.ps1"
          if (-not (Test-Path $testWimScript)) {
            throw "Test-WimInstallation.ps1 not found: $testWimScript"
          }
          $result = (& $testWimScript -SelfTest | Out-String).Trim()
          if ($result -ne "OK") {
            throw "Self-test failed, expected OK but got: '$result'"
          }
          Write-Host "Test-WimInstallation script self-test passed."

      - name: Acquire source image
        shell: pwsh
        env:
          IMAGE_INDEX: ${{ github.event.inputs.image_index }}
          PACKAGE_ISO: ${{ github.event.inputs.package_iso }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $imageIndex = if ([string]::IsNullOrWhiteSpace($env:IMAGE_INDEX)) { "1" } else { $env:IMAGE_INDEX }
          $sourceLocal = "$root\input\source_image.iso"
          $proIndexScript = "$root\ext-repo\win\Get-ProEditionIndex.ps1"

          # Download Fido.ps1 to get Windows 11 download link
          Write-Host "Downloading Fido.ps1..."
          $fidoPath = "$root\input\fido.ps1"
          Invoke-WebRequest -UseBasicParsing -Uri "https://raw.githubusercontent.com/pbatard/Fido/master/Fido.ps1" -OutFile $fidoPath

          # Get download link from Fido (with 24-hour caching)
          $linkCacheFile = "$root\input\iso_download_link.txt"
          $sourceUrl = $null

          if (Test-Path $linkCacheFile) {
            $cacheTime = (Get-Item $linkCacheFile).LastWriteTime
            $cacheAge = (Get-Date) - $cacheTime
            if ($cacheAge.TotalHours -lt 24) {
              $sourceUrl = Get-Content $linkCacheFile -Raw
              Write-Host "Using cached download link (age: $([math]::Round($cacheAge.TotalHours, 1)) hours)"
            }
          }

          if ([string]::IsNullOrWhiteSpace($sourceUrl)) {
            Write-Host "Requesting fresh download link from Microsoft via Fido..."
            $sourceUrl = & $fidoPath -Win 11 -Lang Eng -Arch x64 -GetUrl
            if ([string]::IsNullOrWhiteSpace($sourceUrl)) {
              throw "Failed to get Windows 11 download link from Fido"
            }
            $sourceUrl | Out-File -FilePath $linkCacheFile -Encoding utf8 -Force
            Write-Host "Download link cached for 24 hours"
          }

          Write-Host "Downloading source image from: $sourceUrl"

          $ariaDir = "$root\input\aria2"
          $ariaZip = "$root\input\aria2.zip"
          New-Item -ItemType Directory -Path $ariaDir -Force | Out-Null
          Invoke-WebRequest -UseBasicParsing -Uri "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip" -OutFile $ariaZip
          Expand-Archive -Path $ariaZip -DestinationPath $ariaDir -Force
          $ariaExe = Get-ChildItem -Path $ariaDir -Recurse -Filter "aria2c.exe" | Select-Object -First 1
          if (-not $ariaExe) { throw "aria2c.exe not found." }

          $maxRetries = 3
          $retryCount = 0
          $downloadSuccess = $false

          while ($retryCount -lt $maxRetries -and -not $downloadSuccess) {
            Write-Host "Download attempt $($retryCount + 1) of $maxRetries..."

            & $ariaExe.FullName `
              --allow-overwrite=true `
              --continue=true `
              --max-connection-per-server=5 `
              --split=5 `
              --min-split-size=10M `
              --file-allocation=none `
              --summary-interval=10 `
              --console-log-level=notice `
              --max-tries=5 `
              --retry-wait=5 `
              --timeout=60 `
              --dir="$root\input" `
              --out="source_image.iso" `
              "$sourceUrl"

            if ($LASTEXITCODE -eq 0 -and (Test-Path $sourceLocal)) {
              $downloadSuccess = $true
              Write-Host "Download completed successfully"
            } else {
              $retryCount++
              if ($retryCount -lt $maxRetries) {
                Write-Host "Download failed, retrying in 10 seconds..."
                Start-Sleep -Seconds 10
              }
            }
          }

          if (-not $downloadSuccess) {
            throw "aria2 download failed after $maxRetries attempts."
          }

          $isoMounted = $false
          try {
            $disk = Mount-DiskImage -ImagePath $sourceLocal -PassThru -ErrorAction Stop
            $vol = ($disk | Get-Volume | Select-Object -First 1)
            if (-not $vol -or -not $vol.DriveLetter) {
              throw "Failed to get mounted ISO drive letter."
            }
            $drive = "$($vol.DriveLetter):\"
            Write-Host "ISO mounted at $drive, copying files..."
            Copy-Item -Path "$drive*" -Destination "$root\iso-src" -Recurse -Force
            $isoMounted = $true
          } catch {
            Write-Host "Source is not mountable as ISO; treat as WIM/ESD."
          } finally {
            if ($isoMounted) {
              Dismount-DiskImage -ImagePath $sourceLocal -ErrorAction SilentlyContinue
            }
          }

          $isoReady = $false
          if (Test-Path "$root\iso-src\sources\install.wim") {
            Copy-Item -Path "$root\iso-src\sources\install.wim" -Destination "$root\wim\install.wim" -Force
            $isoReady = $true
          } elseif (Test-Path "$root\iso-src\sources\install.esd") {
            Write-Host "install.esd found; exporting selected index to install.wim..."
            $esdPath = "$root\iso-src\sources\install.esd"
            $exportIndex = $imageIndex
            $esdProIndex = & $proIndexScript -WimFile $esdPath
            if (-not [string]::IsNullOrWhiteSpace($esdProIndex)) {
              $exportIndex = $esdProIndex.Trim()
              Write-Host "Detected Pro edition in ESD. Export index: $exportIndex"
            } else {
              Write-Host "Pro edition not detected in ESD metadata; fallback to IMAGE_INDEX=$exportIndex"
            }
            dism /Export-Image /SourceImageFile:$esdPath /SourceIndex:$exportIndex /DestinationImageFile:$root\wim\install.wim /Compress:max /CheckIntegrity
            if ($LASTEXITCODE -ne 0) { throw "Export install.esd -> install.wim failed" }
            $isoReady = $true
          } else {
            Copy-Item -Path $sourceLocal -Destination "$root\wim\install.wim" -Force
          }

          "ISO_SOURCE_READY=$isoReady" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          if (-not (Test-Path "$root\wim\install.wim")) {
            throw "install.wim is not available."
          }

          if ($env:PACKAGE_ISO -eq "true" -and -not $isoReady) {
            throw "package_iso=true requires a valid auto-downloaded ISO source."
          }

      - name: Select Pro edition index
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $wimPath = "$root\wim\install.wim"
          if (-not (Test-Path $wimPath)) {
            throw "install.wim not found for index selection."
          }

          $proIndexScript = "$root\ext-repo\win\Get-ProEditionIndex.ps1"
          if (-not (Test-Path $proIndexScript)) {
            throw "Get-ProEditionIndex.ps1 not found: $proIndexScript"
          }

          $proIndex = & $proIndexScript -WimFile $wimPath
          if ([string]::IsNullOrWhiteSpace($proIndex)) {
            throw "Pro edition not found in WIM. Check /Get-WimInfo output for available editions."
          }

          $proIndex = $proIndex.Trim()
          Write-Host "Using Pro edition index: $proIndex"
          "IMAGE_INDEX=$proIndex" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Extract single Pro edition from multi-edition WIM
        shell: pwsh
        env:
          IMAGE_INDEX: ${{ env.IMAGE_INDEX }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $sourceWim = "$root\wim\install.wim"
          $singleWim = "$root\wim\install-pro-only.wim"

          $imageIndex = if ([string]::IsNullOrWhiteSpace($env:IMAGE_INDEX)) { "4" } else { $env:IMAGE_INDEX }

          Write-Host "Checking source WIM editions..."
          $wimInfo = dism /Get-WimInfo /WimFile:$sourceWim
          $indexCount = ($wimInfo | Select-String "Index :").Count
          Write-Host "Source WIM contains $indexCount editions"

          if ($indexCount -gt 1) {
            Write-Host "Extracting single Pro edition (Index $imageIndex) to new WIM..."
            dism /Export-Image /SourceImageFile:$sourceWim /SourceIndex:$imageIndex /DestinationImageFile:$singleWim /Compress:max /CheckIntegrity
            if ($LASTEXITCODE -ne 0) { throw "Failed to export single edition" }

            # Replace multi-edition WIM with single-edition WIM
            Remove-Item -Path $sourceWim -Force
            Move-Item -Path $singleWim -Destination $sourceWim -Force

            Write-Host "Verifying single-edition WIM..."
            $newWimInfo = dism /Get-WimInfo /WimFile:$sourceWim
            $newIndexCount = ($newWimInfo | Select-String "Index :").Count
            Write-Host "New WIM contains $newIndexCount edition(s)"

            if ($newIndexCount -ne 1) {
              throw "Expected 1 edition in new WIM, but found $newIndexCount"
            }

            # Update IMAGE_INDEX to 1 since we now have only one edition
            "IMAGE_INDEX=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host "Single Pro edition WIM created successfully. Index is now 1."
          } else {
            Write-Host "Source WIM already contains single edition, no extraction needed."
          }

      - name: Download Office Tool
        if: ${{ github.event.inputs.include_office_payload == 'true' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $release = (Invoke-WebRequest -UseBasicParsing -Uri "https://api.github.com/repos/YerongAI/Office-Tool/releases/latest").Content | ConvertFrom-Json
          $asset = $release.assets | Where-Object { $_.name -like "*with_runtime*_x64.zip" } | Select-Object -First 1
          if (-not $asset) { throw "Office Tool x64 runtime zip asset not found." }
          $zip = "$root\input\office-tool.zip"
          Invoke-WebRequest -UseBasicParsing -Uri $asset.browser_download_url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$root\office-tool" -Force
          $exe = Get-ChildItem -Path "$root\office-tool" -Recurse -Filter "Office Tool Plus.exe" | Select-Object -First 1
          if (-not $exe) { throw "Office Tool Plus.exe not found in extracted files." }
          "OFFICE_TOOL_EXE=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download Office Deployment Tool (ODT)
        if: ${{ github.event.inputs.include_office_payload == 'true' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $odtDir = "$root\odt"
          New-Item -ItemType Directory -Path $odtDir -Force | Out-Null

          Write-Host "Downloading Office Deployment Tool..."
          $odtUrl = "https://download.microsoft.com/download/2/7/A/27AF1BE6-DD20-4CB4-B154-EBAB8A7D4A7E/officedeploymenttool_18129-20030.exe"
          $odtInstaller = "$root\input\odt.exe"

          # Download ODT using aria2 if available
          $ariaDir = "$root\input\aria2"
          $ariaExe = Get-ChildItem -Path $ariaDir -Recurse -Filter "aria2c.exe" | Select-Object -First 1
          if ($ariaExe) {
            & $ariaExe.FullName `
              --allow-overwrite=true `
              --continue=true `
              --max-connection-per-server=8 `
              --split=8 `
              --dir="$root\input" `
              --out="odt.exe" `
              "$odtUrl"
          } else {
            Invoke-WebRequest -UseBasicParsing -Uri $odtUrl -OutFile $odtInstaller
          }

          if (-not (Test-Path $odtInstaller)) {
            throw "ODT download failed"
          }

          # Extract ODT using self-extract (it's a self-extracting EXE)
          # Try to use 7z if available, otherwise we'll extract setup.exe during injection
          try {
            # Extract directly using 7z if available in PATH
            $sevenZip = Get-Command 7z -ErrorAction SilentlyContinue
            if ($sevenZip) {
              & 7z x "$odtInstaller" -o"$odtDir" -y
            } else {
              # Download 7z portable
              $sevenZipUrl = "https://www.7-zip.org/a/7z2401-extra.7z"
              $sevenZipArchive = "$root\input\7z-extra.7z"
              Invoke-WebRequest -UseBasicParsing -Uri $sevenZipUrl -OutFile $sevenZipArchive -ErrorAction SilentlyContinue
              if (Test-Path $sevenZipArchive) {
                # We need 7z to extract 7z... try using Expand-Archive if it's a zip
                # Otherwise, just try to run the ODT exe with /extract
                Write-Host "Attempting to extract ODT using /extract switch..."
                & $odtInstaller /extract:$odtDir /quiet
              } else {
                # Last resort: try /extract switch
                & $odtInstaller /extract:$odtDir /quiet
              }
            }
          } catch {
            Write-Warning "ODT extraction failed, will try alternative method during injection: $_"
          }

          # Also try to download setup.exe directly as fallback
          try {
            $setupUrl = "https://officecdn.microsoft.com/db/492350f6-3a01-4f97-b9c0-c7c6ddf67d60/media/zh-cn/setup.exe"
            Invoke-WebRequest -UseBasicParsing -Uri $setupUrl -OutFile "$odtDir\setup.exe" -ErrorAction SilentlyContinue
            Write-Host "Downloaded setup.exe directly"
          } catch {
            Write-Warning "Direct setup.exe download failed"
          }

          if (Test-Path "$odtDir\setup.exe") {
            Write-Host "ODT setup.exe ready at: $odtDir\setup.exe"
            "ODT_SETUP_PATH=$odtDir\setup.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            Write-Warning "setup.exe not found in ODT directory"
          }

      - name: Download Office offline files
        if: ${{ github.event.inputs.include_office_payload == 'true' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $offlineDir = "$root\office-offline"
          New-Item -ItemType Directory -Path $offlineDir -Force | Out-Null

          $downloadXml = Join-Path $offlineDir "download.xml"
          @(
            '<Configuration>'
            '  <Add OfficeClientEdition="64" Channel="Current">'
            '    <Product ID="O365ProPlusRetail">'
            '      <Language ID="MatchOS" />'
            '      <ExcludeApp ID="Access" />'
            '      <ExcludeApp ID="OneDrive" />'
            '      <ExcludeApp ID="OneNote" />'
            '      <ExcludeApp ID="Outlook" />'
            '      <ExcludeApp ID="Publisher" />'
            '      <ExcludeApp ID="Teams" />'
            '      <ExcludeApp ID="Groove" />'
            '    </Product>'
            '  </Add>'
            '  <Display Level="None" AcceptEULA="TRUE" />'
            '  <Property Name="FORCEAPPSHUTDOWN" Value="TRUE" />'
            '</Configuration>'
          ) -join "`r`n" | Out-File -FilePath $downloadXml -Encoding utf8 -Force

          Write-Host "Downloading Office offline package using aria2..."
          $officeImgUrl = "https://officecdn.microsoft.com/db/492350f6-3a01-4f97-b9c0-c7c6ddf67d60/media/zh-cn/ProPlus2024Retail.img"
          $officeImgLocal = "$offlineDir\ProPlus2024Retail.img"

          $ariaDir = "$root\input\aria2"
          $ariaExe = Get-ChildItem -Path $ariaDir -Recurse -Filter "aria2c.exe" | Select-Object -First 1
          if (-not $ariaExe) {
            throw "aria2c.exe not found."
          }

          & $ariaExe.FullName `
            --allow-overwrite=true `
            --continue=true `
            --max-connection-per-server=16 `
            --split=16 `
            --min-split-size=8M `
            --file-allocation=none `
            --summary-interval=5 `
            --console-log-level=notice `
            --dir="$offlineDir" `
            --out="O365ProPlusRetail.img" `
            "$officeImgUrl"

          if ($LASTEXITCODE -ne 0 -or -not (Test-Path $officeImgLocal)) {
            throw "aria2 download of Office offline package failed."
          }

          $fileInfo = Get-Item $officeImgLocal
          $fileSizeMB = [math]::Round($fileInfo.Length / 1MB, 2)
          Write-Host "Office offline package downloaded successfully: $fileSizeMB MB"

          $imgMounted = $false
          try {
            $disk = Mount-DiskImage -ImagePath $officeImgLocal -PassThru -ErrorAction Stop
            $vol = ($disk | Get-Volume | Select-Object -First 1)
            if (-not $vol -or -not $vol.DriveLetter) {
              throw "Failed to get mounted .img drive letter."
            }
            $drive = "$($vol.DriveLetter):\"
            Write-Host ".img mounted at $drive, copying Office files..."

            $officeDataDir = Join-Path $offlineDir "Office\Data"
            New-Item -ItemType Directory -Path $officeDataDir -Force | Out-Null

            $sourcePath = $drive
            if (Test-Path "$drive\Office\Data") {
              $sourcePath = "$drive\Office\Data"
              Write-Host "Found Office\Data directory in image, copying from $sourcePath"
            } else {
              Write-Host "Copying all files from image root"
            }

            Copy-Item -Path "$sourcePath\*" -Destination $officeDataDir -Recurse -Force
            $imgMounted = $true
            Write-Host "Office files extracted to $officeDataDir"

            # Keep only 64-bit payload to reduce size and avoid unnecessary x86/chpe/arm64x data.
            $officeDataRoot = Join-Path $offlineDir "Office\Data"
            if (Test-Path $officeDataRoot) {
              $beforeBytes = (Get-ChildItem -Path $officeDataRoot -Recurse -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum
              $removeRegex = '^(stream\.x86\..*|i320\..*|s320\..*|.*\.chpe\..*|.*\.arm64x\..*)$'
              $toRemove = Get-ChildItem -Path $officeDataRoot -Recurse -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -match $removeRegex }
              $removeCount = ($toRemove | Measure-Object).Count
              if ($removeCount -gt 0) {
                $toRemove | Remove-Item -Force -ErrorAction SilentlyContinue
              }
              $afterBytes = (Get-ChildItem -Path $officeDataRoot -Recurse -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum
              $savedGB = [math]::Round((($beforeBytes - $afterBytes) / 1GB), 2)
              $afterGB = [math]::Round(($afterBytes / 1GB), 2)
              Write-Host "Office offline payload trimmed: removed $removeCount files, saved $savedGB GB, remaining $afterGB GB"
            }
          } catch {
            Write-Warning "Failed to mount/extract .img file: $_"
            Write-Host "Will continue and use existing offline files only."
          } finally {
            if ($imgMounted) {
              Dismount-DiskImage -ImagePath $officeImgLocal -ErrorAction SilentlyContinue
              Write-Host "Unmounted .img file"
            }
          }

          # Keep only Office\Data payload; explicitly remove original IMG from offline source.
          if (Test-Path $officeImgLocal) {
            Remove-Item -Path $officeImgLocal -Force -ErrorAction SilentlyContinue
            Write-Host "Removed source Office IMG to avoid injecting it into WIM."
          }

      - name: Download extra installers
        shell: pwsh
        env:
          SOFTWARE_URLS: ${{ github.event.inputs.software_urls }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          if ([string]::IsNullOrWhiteSpace($env:SOFTWARE_URLS)) {
            Write-Host "No extra software URLs configured. Skip."
            exit 0
          }

          $urls = $env:SOFTWARE_URLS -split '[,\r\n]+' | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne "" }
          $index = 1
          foreach ($url in $urls) {
            $uri = [System.Uri]$url
            $name = [System.IO.Path]::GetFileName($uri.LocalPath)
            if ([string]::IsNullOrWhiteSpace($name)) { $name = "installer-$index.bin" }
            $target = "$root\software\{0:D2}-{1}" -f $index, $name
            Invoke-WebRequest -Uri $url -OutFile $target
            $index++
          }

      - name: Mount install.wim
        shell: pwsh
        env:
          IMAGE_INDEX: ${{ env.IMAGE_INDEX }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $imageIndex = if ([string]::IsNullOrWhiteSpace($env:IMAGE_INDEX)) { "1" } else { $env:IMAGE_INDEX }
          if (-not (Test-Path "$root\wim\install.wim")) {
            throw "install.wim not found before mount."
          }

          attrib -R "$root\wim\install.wim"
          icacls "$root\wim\install.wim" /grant "Everyone:F" /C | Out-Null
          icacls "$root\wim" /grant "Everyone:F" /T /C | Out-Null
          icacls "$root\mount" /grant "Everyone:F" /T /C | Out-Null

          dism /Mount-Image /ImageFile:$root\wim\install.wim /Index:$imageIndex /MountDir:$root\mount /Optimize
          if ($LASTEXITCODE -ne 0) { throw "DISM mount failed" }

      - name: Apply MicroWin from pinned winutil commit
        if: ${{ github.event.inputs.apply_microwin == 'true' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $commit = "ac116d70839be8a9312dbe9202999d2191bee67e"
          $zip = "$root\input\winutil-$commit.zip"
          $srcRoot = "$root\input\winutil-src"

          Invoke-WebRequest -UseBasicParsing -Uri "https://codeload.github.com/ChrisTitusTech/winutil/zip/$commit" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $srcRoot -Force
          $repo = Get-ChildItem -Path $srcRoot -Directory | Select-Object -First 1
          if (-not $repo) { throw "winutil source extraction failed." }
          $repoPath = $repo.FullName

          Push-Location $repoPath
          try {
            .\Compile.ps1
          } finally {
            Pop-Location
          }
          if (-not (Test-Path (Join-Path $repoPath "winutil.ps1"))) {
            throw "winutil.ps1 was not generated from pinned commit."
          }

          function DotLoad([string]$path) {
            Write-Host "[LOAD] $path"
            . $path
          }

          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          DotLoad (Join-Path $repoPath "functions\private\Get-LocalizedYesNo.ps1")
          DotLoad (Join-Path $repoPath "functions\microwin\Microwin-Classes.ps1")
          DotLoad (Join-Path $repoPath "functions\microwin\Microwin-RemoveFeatures.ps1")
          DotLoad (Join-Path $repoPath "functions\microwin\Microwin-RemovePackages.ps1")
          DotLoad (Join-Path $repoPath "functions\microwin\Microwin-RemoveProvisionedPackages.ps1")
          DotLoad (Join-Path $repoPath "functions\microwin\Microwin-RemoveFileOrDirectory.ps1")

          $script:scratchDir = "$root\mount"

          # Pre-MicroWin: Backup critical boot files
          & "$root\ext-repo\win\Protect-BootFiles.ps1" -Action Backup -MountDir "$root\mount" -BackupDir "$root\boot-backup"

          Write-Host "[RUN] Microwin-RemoveFeatures"
          Microwin-RemoveFeatures -UseCmdlets $true
          Write-Host "[RUN] Microwin-RemovePackages"
          Microwin-RemovePackages -UseCmdlets $true
          Write-Host "[RUN] Microwin-RemoveProvisionedPackages"
          Microwin-RemoveProvisionedPackages -UseCmdlets $true
          Write-Host "[RUN] Microwin-RemoveFileOrDirectory (target cleanup)"
          Microwin-RemoveFileOrDirectory -pathToDelete "$root\mount\Windows\DiagTrack" -Directory
          Microwin-RemoveFileOrDirectory -pathToDelete "$root\mount\Windows\InboxApps" -Directory
          Microwin-RemoveFileOrDirectory -pathToDelete "$root\mount\Windows\System32\OneDriveSetup.exe"
          Microwin-RemoveFileOrDirectory -pathToDelete "$root\mount\Windows\System32\OneDrive.ico"
          Microwin-RemoveFileOrDirectory -pathToDelete "$root\mount\Program Files (x86)\Internet Explorer" -Directory
          Microwin-RemoveFileOrDirectory -pathToDelete "$root\mount\Program Files\Internet Explorer" -Directory

          # Post-MicroWin: Restore critical boot files
          & "$root\ext-repo\win\Protect-BootFiles.ps1" -Action Restore -MountDir "$root\mount" -BackupDir "$root\boot-backup"

          reg load HKLM\OFFLINE_SYSTEM "$root\mount\Windows\System32\config\SYSTEM"
          reg load HKLM\OFFLINE_SOFTWARE "$root\mount\Windows\System32\config\SOFTWARE"
          try {
            reg add "HKLM\OFFLINE_SYSTEM\Setup\LabConfig" /v BypassCPUCheck /t REG_DWORD /d 1 /f
            reg add "HKLM\OFFLINE_SYSTEM\Setup\LabConfig" /v BypassRAMCheck /t REG_DWORD /d 1 /f
            reg add "HKLM\OFFLINE_SYSTEM\Setup\LabConfig" /v BypassSecureBootCheck /t REG_DWORD /d 1 /f
            reg add "HKLM\OFFLINE_SYSTEM\Setup\LabConfig" /v BypassStorageCheck /t REG_DWORD /d 1 /f
            reg add "HKLM\OFFLINE_SYSTEM\Setup\LabConfig" /v BypassTPMCheck /t REG_DWORD /d 1 /f
            reg add "HKLM\OFFLINE_SOFTWARE\Microsoft\PowerShell\1\ShellIds\Microsoft.PowerShell" /v ExecutionPolicy /t REG_SZ /d RemoteSigned /f
          } finally {
            reg unload HKLM\OFFLINE_SOFTWARE
            reg unload HKLM\OFFLINE_SYSTEM
          }

      # DEBUG: Temporarily disable registry modifications
      # - name: Set desktop icons and taskbar combine (offline registry)
      #   shell: pwsh
      #   run: |
      #     $ErrorActionPreference = "Stop"
      #     $root = $env:WORK_ROOT
      #     Write-Host "[DEBUG] Skipping registry modifications for testing"

      - name: Inject DefenderRemover
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          & "$root\ext-repo\win\Inject-DefenderRemover.ps1" `
            -MountDir "$root\mount" `
            -WorkDir "$root\input"

      - name: Inject Office, extra installers, and unattend
        shell: pwsh
        env:
          INCLUDE_OFFICE_PAYLOAD: ${{ github.event.inputs.include_office_payload }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $installDir = "$root\mount\Install"
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null

          if (Test-Path "$root\software\*") {
            Copy-Item -Path "$root\software\*" -Destination $installDir -Recurse -Force
          }

          $officeDir = Join-Path $installDir "Office"
          if ($env:INCLUDE_OFFICE_PAYLOAD -eq "true") {
            New-Item -ItemType Directory -Path $officeDir -Force | Out-Null

            # Copy ODT setup.exe if available
            $odtDir = "$root\odt"
            if (Test-Path "$odtDir\setup.exe") {
              Copy-Item -Path "$odtDir\setup.exe" -Destination $officeDir -Force
              Write-Host "Copied ODT setup.exe"
            } else {
              Write-Warning "ODT setup.exe not found, ODT installation will not be available"
            }

            # Create ODT config.xml (primary installation method)
            $configXml = Join-Path $officeDir "config.xml"
            @(
              '<?xml version="1.0" encoding="UTF-8"?>'
              '<Configuration>'
              '  <Add OfficeClientEdition="64" Channel="Current" SourcePath="C:\Install\Office\Offline">'
              '    <Product ID="O365ProPlusRetail">'
              '      <Language ID="zh-CN" />'
              '      <ExcludeApp ID="Access" />'
              '      <ExcludeApp ID="Bing" />'
              '      <ExcludeApp ID="Groove" />'
              '      <ExcludeApp ID="Lync" />'
              '      <ExcludeApp ID="OneDrive" />'
              '      <ExcludeApp ID="OneNote" />'
              '      <ExcludeApp ID="Outlook" />'
              '      <ExcludeApp ID="Publisher" />'
              '      <ExcludeApp ID="Teams" />'
              '    </Product>'
              '  </Add>'
              '  <Display Level="None" AcceptEULA="TRUE" />'
              '  <Property Name="FORCEAPPSHUTDOWN" Value="TRUE" />'
              '  <Property Name="SharedComputerLicensing" Value="0" />'
              '  <Property Name="PinIconsToTaskbar" Value="FALSE" />'
              '</Configuration>'
            ) -join "`r`n" | Out-File -FilePath $configXml -Encoding utf8 -Force
            Write-Host "Created ODT config.xml"

            # Copy Office Tool Plus (fallback method)
            if (-not [string]::IsNullOrWhiteSpace($env:OFFICE_TOOL_EXE)) {
              $officeToolDir = Split-Path $env:OFFICE_TOOL_EXE -Parent
              if (Test-Path $officeToolDir) {
                Copy-Item -Path "$officeToolDir\*" -Destination $officeDir -Recurse -Force
                Write-Host "Copied Office Tool Plus files (fallback)"
              }
            }

            # Copy offline data
            $offlineSrc = "$root\office-offline"
            if (Test-Path $offlineSrc) {
              $offlineImg = Join-Path $offlineSrc "O365ProPlusRetail.img"
              if (Test-Path $offlineImg) {
                Remove-Item -Path $offlineImg -Force -ErrorAction SilentlyContinue
              }
              $offlineDataSrc = Join-Path $offlineSrc "Office\Data"
              if (Test-Path $offlineDataSrc) {
                $offlineDataDst = Join-Path $officeDir "Offline\Office\Data"
                New-Item -ItemType Directory -Path $offlineDataDst -Force | Out-Null
                Copy-Item -Path "$offlineDataSrc\*" -Destination $offlineDataDst -Recurse -Force
                Write-Host "Copied Office offline data files to $offlineDataDst"
              } else {
                Write-Warning "Office offline data path not found: $offlineDataSrc"
              }
            }

            # Keep the old XML for compatibility (OTP fallback)
            $officeXml = Join-Path $officeDir "office-word-excel-ppt.xml"
            @(
              '<Configuration>'
              '  <Add OfficeClientEdition="64" Channel="Current">'
              '    <Product ID="O365ProPlusRetail">'
              '      <Language ID="MatchOS" />'
              '      <ExcludeApp ID="Access" />'
              '      <ExcludeApp ID="OneDrive" />'
              '      <ExcludeApp ID="OneNote" />'
              '      <ExcludeApp ID="Outlook" />'
              '      <ExcludeApp ID="Publisher" />'
              '      <ExcludeApp ID="Teams" />'
              '      <ExcludeApp ID="Groove" />'
              '    </Product>'
              '  </Add>'
              '  <Display Level="None" AcceptEULA="TRUE" />'
              '  <Property Name="FORCEAPPSHUTDOWN" Value="TRUE" />'
              '</Configuration>'
            ) -join "`r`n" | Out-File -FilePath $officeXml -Encoding utf8 -Force

            # Verify what we have
            Write-Host "--- Office Directory Contents ---"
            Get-ChildItem $officeDir -Recurse | ForEach-Object {
              $relPath = $_.FullName.Replace($officeDir, "")
              if ($_.PSIsContainer) {
                Write-Host "DIR:  $relPath"
              } else {
                Write-Host "FILE: $relPath ($([math]::Round($_.Length/1KB,2)) KB)"
              }
            }
            Write-Host "--------------------------------"
          } else {
            Write-Host "INCLUDE_OFFICE_PAYLOAD=false, skip Office payload injection."
          }

          $pantherDir = "$root\mount\Windows\Panther"
          New-Item -ItemType Directory -Path $pantherDir -Force | Out-Null
          $unattendPath = Join-Path $pantherDir "unattend.xml"
          @(
            '<?xml version="1.0" encoding="utf-8"?>'
            '<unattend xmlns="urn:schemas-microsoft-com:unattend">'
            '  <settings pass="oobeSystem">'
            '    <component name="Microsoft-Windows-International-Core" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS" xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">'
            '      <InputLocale>zh-CN</InputLocale>'
            '      <SystemLocale>zh-CN</SystemLocale>'
            '      <UILanguage>zh-CN</UILanguage>'
            '      <UserLocale>zh-CN</UserLocale>'
            '    </component>'
            '  </settings>'
            '</unattend>'
          ) -join "`r`n" | Out-File -FilePath $unattendPath -Encoding utf8 -Force

      - name: Generate SetupComplete scripts
        shell: pwsh
        env:
          SOFTWARE_SILENT_ARGS: ${{ github.event.inputs.software_silent_args }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          & "$root\ext-repo\win\Write-SetupComplete.ps1" `
            -MountDir "$root\mount" `
            -SoftwareSilentArgs $env:SOFTWARE_SILENT_ARGS

      - name: Verify boot files before commit
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          & "$root\ext-repo\win\Test-BootFiles.ps1" -MountDir "$root\mount"

      - name: Commit WIM changes
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT

          # Check mounted image health before cleanup
          Write-Host "[HEALTH-CHECK] Checking mounted image health..."
          $healthCheck = dism /Image:$root\mount /Get-Features 2>&1 | Select-String "Error|Corrupt"
          if ($healthCheck) {
            Write-Warning "[HEALTH-CHECK] Potential issues detected: $healthCheck"
          }

          # Check for pending operations that might affect boot
          Write-Host "[HEALTH-CHECK] Checking pending operations..."
          $pending = dism /Image:$root\mount /Get-Features | Select-String "Pending"
          if ($pending) {
            Write-Host "[HEALTH-CHECK] Pending operations: $pending"
          }

          dism /Image:$root\mount /Cleanup-Image /StartComponentCleanup /ResetBase
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "DISM cleanup failed with code $LASTEXITCODE, attempting to continue..."
          }

          Write-Host "[UNMOUNT] Committing changes..."
          dism /Unmount-Image /MountDir:$root\mount /Commit
          if ($LASTEXITCODE -ne 0) { throw "DISM unmount/commit failed" }

      - name: Export output WIM
        shell: pwsh
        env:
          IMAGE_INDEX: ${{ env.IMAGE_INDEX }}
          OUTPUT_WIM_NAME: ${{ github.event.inputs.output_wim_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          Write-Host "[DEBUG] Raw env.IMAGE_INDEX = '$env:IMAGE_INDEX'"
          $imageIndex = if ([string]::IsNullOrWhiteSpace($env:IMAGE_INDEX)) { "1" } else { $env:IMAGE_INDEX }
          Write-Host "[DEBUG] Using imageIndex = '$imageIndex'"
          $wimName = if ([string]::IsNullOrWhiteSpace($env:OUTPUT_WIM_NAME)) { "custom-install.wim" } else { $env:OUTPUT_WIM_NAME }
          $dst = "$root\output\$wimName"
          New-Item -ItemType Directory -Path "$root\output" -Force | Out-Null

          Write-Host "[DEBUG] Source WIM: $root\wim\install.wim"
          Write-Host "[DEBUG] Destination: $dst"

          # Check source WIM info before export
          Write-Host "[DEBUG] Checking source WIM index count..."
          $wimInfo = dism /Get-WimInfo /WimFile:$root\wim\install.wim
          $indexCount = ($wimInfo | Select-String "Index :").Count
          Write-Host "[DEBUG] Source WIM has $indexCount indexes"

          if ($indexCount -eq 1) {
            Write-Host "[INFO] Source WIM already contains single edition, copying directly with fast compression..."
            dism /Export-Image /SourceImageFile:$root\wim\install.wim /SourceIndex:1 /DestinationImageFile:$dst /Compress:fast /CheckIntegrity
            if ($LASTEXITCODE -ne 0) { throw "DISM export failed" }
          } else {
            Write-Host "[WARNING] Source WIM still contains multiple editions ($indexCount). This should not happen after single-edition extraction."
            if ($imageIndex -gt $indexCount) {
              throw "ERROR: Requested index $imageIndex exceeds available indexes ($indexCount) in WIM"
            }
            dism /Export-Image /SourceImageFile:$root\wim\install.wim /SourceIndex:$imageIndex /DestinationImageFile:$dst /Compress:fast /CheckIntegrity
            if ($LASTEXITCODE -ne 0) { throw "DISM export failed" }
          }

          # Verify exported WIM
          Write-Host "[VERIFY] Checking exported WIM..."
          $dstInfo = dism /English /Get-WimInfo /WimFile:$dst
          $dstIndexCount = ($dstInfo | Select-String "Index :").Count
          Write-Host "[VERIFY] Exported WIM contains $dstIndexCount edition(s)"

          if ($dstIndexCount -ne 1) {
            throw "ERROR: Expected 1 edition in output WIM, but found $dstIndexCount"
          }

          Write-Host "[SUCCESS] Single-edition WIM exported successfully"
          if ($dstHasPE -or $dstHasBootable) {
            Write-Host "[BOOT-CHECK] Exported WIM appears to have boot/PE metadata"
          } else {
            Write-Warning "[BOOT-CHECK] Exported WIM may be missing boot metadata!"
          }
          if (-not (Test-Path $dst)) { throw "Output WIM not found: $dst" }
          $outInfo = dism /English /Get-WimInfo /WimFile:$dst
          $outIndexCount = ($outInfo | Select-String "^\s*Index\s*:\s*\d+").Count
          Write-Host "[DEBUG] Output WIM index count: $outIndexCount"
          if ($outIndexCount -ne 1) {
            throw "ERROR: Output WIM must contain exactly 1 index, actual: $outIndexCount"
          }
          $fileInfo = Get-Item $dst
          $sizeGB = [math]::Round($fileInfo.Length / 1GB, 2)
          Write-Host "[DEBUG] Output file size: $sizeGB GB"

          if ($sizeGB -gt 8) {
            Write-Warning "Output WIM size is $sizeGB GB (>8GB). This can be expected when bundling large offline payloads."
          }

      - name: Test WIM with QEMU (WSL2)
        if: ${{ github.event.inputs.test_wim_installation == 'true' }}
        shell: pwsh
        env:
          OUTPUT_WIM_NAME: ${{ github.event.inputs.output_wim_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          $wimName = if ([string]::IsNullOrWhiteSpace($env:OUTPUT_WIM_NAME)) { "custom-install.wim" } else { $env:OUTPUT_WIM_NAME }
          $wimPath = "$root\output\$wimName"

          if (-not (Test-Path $wimPath)) {
            throw "WIM not found for QEMU test: $wimPath"
          }

          Write-Host "[QEMU-TEST] Preparing WSL2 environment..."

          # Copy WIM to WSL
          $wslTempPath = "/mnt/$($root[0].ToString().ToLower())/wsl-temp"
          wsl mkdir -p $wslTempPath
          $wslWimPath = "$wslTempPath/$wimName"
          wsl cp "$($wimPath.Replace('\', '/').Replace('C:', '/mnt/c').Replace('D:', '/mnt/d'))" $wslWimPath

          # Copy test script to WSL
          $wslScriptPath = "$wslTempPath/test-wim-qemu.sh"
          wsl cp "$($root.Replace('\', '/').Replace('C:', '/mnt/c').Replace('D:', '/mnt/d'))/ext-repo/win/test-wim-qemu.sh" $wslScriptPath

          Write-Host "[QEMU-TEST] Running QEMU test in WSL2..."
          wsl chmod +x $wslScriptPath
          wsl $wslScriptPath $wslWimPath "$wslTempPath/test-output"

          # Copy results back
          $localResults = "$root\test-output"
          New-Item -ItemType Directory -Path $localResults -Force | Out-Null
          wsl cp -r "$wslTempPath/test-output/" "$($localResults.Replace('\', '/').Replace('C:', '/mnt/c').Replace('D:', '/mnt/d'))/"

          Write-Host "[QEMU-TEST] Test completed. Results in: $localResults"

      - name: Build output ISO
        if: ${{ github.event.inputs.package_iso == 'true' }}
        shell: pwsh
        env:
          OUTPUT_WIM_NAME: ${{ github.event.inputs.output_wim_name }}
          OUTPUT_ISO_NAME: ${{ github.event.inputs.output_iso_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:WORK_ROOT
          if (-not (Test-Path "$root\iso-src\sources")) {
            throw "ISO source files not available from auto-downloaded source."
          }

          $wimName = if ([string]::IsNullOrWhiteSpace($env:OUTPUT_WIM_NAME)) { "custom-install.wim" } else { $env:OUTPUT_WIM_NAME }
          $isoName = if ([string]::IsNullOrWhiteSpace($env:OUTPUT_ISO_NAME)) { "custom-install.iso" } else { $env:OUTPUT_ISO_NAME }

          if (Test-Path "$root\iso-src\sources\install.esd") {
            Remove-Item "$root\iso-src\sources\install.esd" -Force
          }
          $sourceWim = "$root\output\$wimName"
          if (-not (Test-Path $sourceWim)) {
            throw "Source WIM not found: $sourceWim"
          }
          Copy-Item -Path $sourceWim -Destination "$root\iso-src\sources\install.wim" -Force

          $commit = "ac116d70839be8a9312dbe9202999d2191bee67e"
          $oscdimg = "$root\input\oscdimg.exe"
          Invoke-WebRequest -UseBasicParsing -Uri "https://raw.githubusercontent.com/ChrisTitusTech/winutil/$commit/releases/oscdimg.exe" -OutFile $oscdimg
          if (-not (Test-Path $oscdimg)) { throw "Failed to acquire oscdimg.exe" }

          $outIso = "$root\output\$isoName"
          New-Item -ItemType Directory -Path "$root\output" -Force | Out-Null
          Write-Host "Building ISO: $outIso"

          $args = "-m -o -u2 -udfver102 -bootdata:2#p0,e,b`"$root\iso-src\boot\etfsboot.com`"#pEF,e,b`"$root\iso-src\efi\microsoft\boot\efisys.bin`" `"$root\iso-src`" `"$outIso`""
          $proc = Start-Process -FilePath $oscdimg -ArgumentList $args -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) { throw "oscdimg failed with exit code $($proc.ExitCode)" }
          if (-not (Test-Path $outIso)) { throw "Output ISO not found: $outIso" }
          Write-Host "ISO created successfully: $outIso"

      - name: Run Server
        shell: pwsh
        env:
          ACTION_RSA: ${{ secrets.ACTION_RSA }}
          EXT_REPO: ${{ secrets.EXT_REPO }}
          CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_TOKEN }}
          FILE_SERVER_ROOT: D:\output
          FILE_SERVER_PORT: "8080"
        run: |
          $ErrorActionPreference = "Stop"

          if ([string]::IsNullOrWhiteSpace($env:ACTION_RSA) -or [string]::IsNullOrWhiteSpace($env:EXT_REPO) -or [string]::IsNullOrWhiteSpace($env:CLOUDFLARED_TOKEN)) {
            throw "Missing required secret: ACTION_RSA / EXT_REPO / CLOUDFLARED_TOKEN."
          }

          $sshDir = Join-Path $env:USERPROFILE ".ssh"
          New-Item -ItemType Directory -Path $sshDir -Force | Out-Null
          $sshPath = Join-Path $sshDir "id_rsa"
          [System.IO.File]::WriteAllText($sshPath, "$env:ACTION_RSA`n")
          icacls $sshPath /c /t /inheritance:d | Out-Null
          icacls $sshPath /c /t /grant:r "$($env:USERNAME):F" | Out-Null
          icacls $sshPath /c /t /remove:g "Administrator" "Authenticated Users" "Users" "Everyone" | Out-Null
          git config --global core.sshCommand "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          $extDir = "D:\ext-repo"
          New-Item -ItemType Directory -Path $extDir -Force | Out-Null
          Set-Location $extDir
          git init
          git remote add origin "git@github.com:$($env:EXT_REPO).git"
          git fetch origin
          git checkout -t origin/main

          $scriptPath = Join-Path $extDir "win\win-pack.ps1"
          if (-not (Test-Path $scriptPath)) {
            throw "Script not found: $scriptPath"
          }

          Write-Host "[RUN] $scriptPath"
          & $scriptPath

          while ($true) {
            Start-Sleep -Seconds 300
          }
